<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>레시피 — Banchan and Co</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#9caf88"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Banchan"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--accent:#9caf88;--accent-dark:#7a9068;--accent-bg:#f0f5ec;--accent-light:#c8d9bc;--bg:#f5f4f0;--surface:#fff;--border:#dedad3;--subtle:#eceae5;--muted:#9a9488;--body:#4a4540;--heading:#2a2520;--brown:#5c3d2e}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--body);min-height:100vh;padding-bottom:60px}

    /* LOCK */
    #lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:1000;padding:32px}
    .lock-icon{font-size:3rem}
    #lock-screen h2{font-size:1.2rem;font-weight:700;color:var(--heading)}
    #lock-screen p{font-size:0.85rem;color:var(--muted)}
    .pin-display{display:flex;gap:12px;margin:8px 0}
    .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:background .15s}
    .pin-dot.filled{background:var(--accent);border-color:var(--accent)}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
    .pin-btn{height:60px;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);font-family:'Noto Sans KR',sans-serif;font-size:1.2rem;font-weight:600;color:var(--heading);cursor:pointer}
    .pin-btn:active{background:var(--accent-bg)}
    .pin-error{font-size:0.82rem;color:#c0392b;min-height:20px}

    /* HEADER */
    header{background:var(--accent);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .back-btn{background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;line-height:1}
    header h1{font-size:1.05rem;font-weight:700}
    .lock-btn{background:none;border:none;color:rgba(255,255,255,0.7);font-size:0.75rem;cursor:pointer}

    /* CONTENT */
    .content{padding:14px;display:flex;flex-direction:column;gap:12px}
    .top-bar{display:flex;gap:8px}
    .search-wrap{flex:1;position:relative}
    .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted);fill:none}
    .search-box{width:100%;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.88rem;color:var(--body);background:var(--surface);border-radius:10px;padding:10px 10px 10px 34px}
    .search-box:focus{border-color:var(--accent)}
    .add-recipe-btn{padding:10px 16px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
    .add-recipe-btn:active{background:var(--accent-dark)}

    /* RECIPE GRID */
    .recipe-grid{display:flex;flex-direction:column;gap:10px}
    .recipe-box{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .recipe-box:active{border-color:var(--accent);background:var(--accent-bg)}
    .recipe-box-title{font-size:0.95rem;font-weight:700;color:var(--heading);margin-bottom:5px}
    .recipe-box-meta{font-size:0.75rem;color:var(--muted);display:flex;gap:10px}
    .recipe-box-preview{font-size:0.78rem;color:var(--muted);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .empty-list{padding:32px 16px;text-align:center;color:var(--muted);font-size:0.85rem}

    /* ADD MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(100%);width:100%;max-width:580px;background:var(--surface);border-radius:22px 22px 0 0;z-index:401;padding:20px 16px 40px;max-height:92vh;overflow-y:auto;transition:transform .3s ease}
    .modal.open{transform:translateX(-50%) translateY(0)}
    .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .modal-title{font-size:1rem;font-weight:700;color:var(--heading);margin-bottom:16px}
    .modal-section{font-size:0.78rem;font-weight:700;color:var(--muted);margin-bottom:8px;margin-top:14px;text-transform:uppercase;letter-spacing:0.04em}
    .modal-input{width:100%;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.88rem;color:var(--body);background:var(--subtle);border-radius:10px;padding:10px 12px;margin-bottom:8px}
    .modal-input:focus{border-color:var(--accent)}
    textarea.modal-input{min-height:90px;resize:vertical;line-height:1.5}
    .serving-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    .serving-label{font-size:0.82rem;color:var(--muted);white-space:nowrap}
    .serving-input{width:80px;border:1px solid var(--border);outline:none;font-family:'DM Mono',monospace;font-size:0.88rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 10px}
    .serving-input:focus{border-color:var(--accent)}

    /* INGREDIENT TAG INPUT */
    .ing-add-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
    .ing-amt-in{width:64px;border:1px solid var(--border);outline:none;font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 8px}
    .ing-amt-in:focus{border-color:var(--accent)}
    .ing-unit-sel{width:72px;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.8rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 4px;cursor:pointer}
    .ing-name-in{flex:1;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 10px}
    .ing-name-in:focus{border-color:var(--accent)}
    .ing-add-small{width:36px;height:36px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:1.2rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .ing-add-small:active{background:var(--accent-dark)}
    .ing-tag-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
    .ing-tag{display:flex;align-items:center;gap:6px;background:var(--accent-bg);border:1.5px solid var(--accent-light);border-radius:10px;padding:6px 10px;font-size:0.82rem;color:var(--accent-dark)}
    .ing-tag.editing{background:var(--subtle);border-color:var(--accent);border-radius:10px}
    .ing-tag-text{flex:1;font-size:0.82rem;color:var(--accent-dark);cursor:pointer}
    .ing-tag-text:active{opacity:0.7}
    .ing-edit-amt{width:60px;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;color:var(--body);background:var(--surface);border-radius:6px;padding:4px 6px}
    .ing-edit-unit{width:68px;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;color:var(--body);background:var(--surface);border-radius:6px;padding:4px 4px;cursor:pointer}
    .ing-edit-name{flex:1;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;color:var(--body);background:var(--surface);border-radius:6px;padding:4px 7px}
    .ing-edit-save{padding:4px 9px;border:none;border-radius:6px;background:var(--accent);color:#fff;font-size:0.75rem;cursor:pointer;white-space:nowrap}
    .ing-tag-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.85rem;line-height:1;padding:0 2px;flex-shrink:0}
    .modal-save-btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:16px}
    .modal-save-btn:active{background:var(--accent-dark)}

    /* DETAIL */
    .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;opacity:0;pointer-events:none;transition:opacity .2s}
    .detail-overlay.open{opacity:1;pointer-events:all}
    .detail-modal{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:580px;background:var(--bg);z-index:501;overflow-y:auto;transition:transform .3s ease}
    .detail-modal.open{transform:translateX(-50%) translateY(0)}
    .detail-header{background:var(--accent);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .detail-header h2{font-size:1.05rem;font-weight:700;flex:1;margin-right:8px}
    .detail-actions{display:flex;gap:8px;flex-shrink:0}
    .detail-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;border-radius:8px;padding:6px 10px;cursor:pointer}
    .detail-body{padding:16px;display:flex;flex-direction:column;gap:14px}
    .section-title{font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px}
    .detail-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden}

    /* INGREDIENTS TABLE */
    .ing-table-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;padding:9px 14px;border-bottom:1px solid var(--subtle);align-items:center;font-size:0.85rem}
    .ing-table-row:last-child{border-bottom:none}
    .ing-table-row.header{background:var(--subtle);font-size:0.72rem;font-weight:700;color:var(--muted);padding:7px 14px}
    .ing-col-name{color:var(--body)}
    .ing-col-amt{font-family:'DM Mono',monospace;color:var(--accent-dark);font-size:0.8rem;text-align:right}
    .ing-col-cost{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--brown);text-align:right}
    .ing-col-cost.no-data{color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.72rem}

    /* COST SUMMARY */
    .cost-summary{background:var(--accent-bg);border:1px solid var(--accent-light);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px}
    .cost-row{display:flex;justify-content:space-between;align-items:center;font-size:0.88rem}
    .cost-label{color:var(--body)}
    .cost-val{font-family:'DM Mono',monospace;font-weight:700;color:var(--accent-dark);font-size:0.95rem}
    .cost-val.per-serving{color:var(--brown);font-size:1rem}
    .cost-divider{height:1px;background:var(--accent-light)}

    /* SERVING CONTROL */
    .serving-control{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
    .serving-control label{font-size:0.82rem;color:var(--muted);flex:1}
    .serving-ctrl-input{width:60px;border:1px solid var(--border);outline:none;font-family:'DM Mono',monospace;font-size:0.9rem;color:var(--heading);background:var(--subtle);border-radius:8px;padding:6px 8px;text-align:center}
    .serving-ctrl-input:focus{border-color:var(--accent)}
    .serving-ctrl-unit{font-size:0.82rem;color:var(--muted)}

    /* NOTES */
    .detail-notes{font-size:0.88rem;color:var(--body);line-height:1.7;white-space:pre-wrap;padding:14px}


    /* DRAWER */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
    .drawer-overlay.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;left:-280px;top:0;bottom:0;width:280px;background:var(--surface);z-index:301;transition:left .25s;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.12)}
    .drawer.open{left:0}
    .drawer-header{background:var(--accent);padding:44px 20px 20px;display:flex;flex-direction:column;gap:6px}
    .drawer-avatar{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover;margin-bottom:4px}
    .drawer-name{font-size:1rem;font-weight:700;color:#fff}
    .drawer-email{font-size:0.73rem;color:rgba(255,255,255,0.65)}
    .drawer-menu{flex:1;padding:10px 0;overflow-y:auto}
    .drawer-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:0.9rem;color:var(--body);cursor:pointer}
    .drawer-item:active{background:var(--accent-bg)}
    .drawer-item.active{color:var(--accent-dark);font-weight:600;background:var(--accent-bg)}
    .drawer-item .di-icon{font-size:1.2rem}
    .drawer-logout{margin:0 16px 20px;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--muted);cursor:pointer;width:calc(100% - 32px)}
    .hamburger-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px;margin-right:4px}
    .hamburger-btn span{display:block;width:22px;height:2px;background:#fff;border-radius:2px}
    /* APPLY TO STOCK */
    .apply-stock-btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--brown);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
    .apply-stock-btn:active{opacity:0.85}
    .stock-preview{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden}
    .stock-preview-hdr{padding:9px 14px;font-size:0.75rem;font-weight:700;color:var(--muted);background:var(--subtle);border-bottom:1px solid var(--border)}
    .stock-preview-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--subtle);font-size:0.82rem}
    .stock-preview-row:last-child{border-bottom:none}
    .stock-preview-name{color:var(--body)}
    .stock-preview-val{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--accent-dark)}
    .stock-preview-val.no-match{color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:0.72rem}
    /* CATEGORY FILTER */
    .cat-bar{display:flex;gap:6px;padding:10px 14px 4px;overflow-x:auto;flex-wrap:nowrap}
    .cat-bar::-webkit-scrollbar{display:none}
    .cat-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
    .cat-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .cat-chip:active{opacity:0.75}
    /* MODAL CATEGORY */
    .cat-modal-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
    .cat-modal-chip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-family:'Noto Sans KR',sans-serif;font-size:0.8rem;color:var(--muted);cursor:pointer}
    .cat-modal-chip.selected{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-dark);font-weight:600}
    .cat-new-row{display:flex;gap:6px;margin-top:6px}
    .cat-new-input{flex:1;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:8px 10px}
    .cat-new-input:focus{border-color:var(--accent)}
    .cat-new-btn{padding:8px 12px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;cursor:pointer}
    .recipe-box-cat{display:inline-block;font-size:0.68rem;padding:2px 7px;border-radius:10px;background:var(--accent-bg);color:var(--accent-dark);font-weight:600;margin-bottom:4px}
    #toast{position:fixed;bottom:20px;right:16px;background:var(--accent-dark);color:#fff;font-size:0.75rem;padding:7px 14px;border-radius:20px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}


    /* ── RESPONSIVE MAX WIDTH ─────────────────────────── */
    @media (min-width: 620px) {
      body {
        max-width: 580px;
        margin: 0 auto;
        box-shadow: 0 0 60px rgba(0,0,0,0.18);
        min-height: 100vh;
      }
      html { background: #dedad3; }
      header { left: auto; right: auto; width: 100%; }
      .tab-bar { width: 100%; }
      .drawer { position: fixed; }
      .drawer-overlay { position: fixed; }
    }
  </style>
</head>
<body>

<!-- LOCK -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <img class="drawer-avatar" id="drawer-avatar" src="" alt=""/>
    <div class="drawer-name" id="drawer-name"></div>
    <div class="drawer-email" id="drawer-email"></div>
  </div>
    <div class="drawer-menu">
    <div class="drawer-item" onclick="location.href='main.html'"><span class="di-icon">🏠</span> 홈</div>
    <div class="drawer-item" onclick="location.href='inventory.html'"><span class="di-icon">📋</span> 재고 관리</div>
    <div class="drawer-item" onclick="location.href='orders.html'"><span class="di-icon">🛒</span> 주문 관리</div>
    <div class="drawer-item" onclick="location.href='shopping.html'"><span class="di-icon">🛍</span> 쇼핑 리스트</div>
    <div class="drawer-item" onclick="location.href='statistics.html'"><span class="di-icon">📊</span> 통계</div>
    <div class="drawer-item" onclick="location.href='schedule.html'"><span class="di-icon">📅</span> 스케줄</div>
    <div class="drawer-item" onclick="location.href='cost.html'"><span class="di-icon">🧮</span> 원가계산</div>
    <div class="drawer-item active"><span class="di-icon">📖</span> 레시피</div>
  </div>
  <button class="drawer-logout" id="logout-btn-drawer">로그아웃</button>
</div>

<div id="lock-screen">
  <div class="lock-icon">🔒</div>
  <h2>레시피</h2>
  <p id="pin-mode-label">PIN을 입력하세요</p>
  <div id="pin-setup-hint" class="pin-setup-msg" style="display:none"></div>
  <div class="pin-display" id="pin-display">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <p class="pin-error" id="pin-error"></p>
  <div class="pin-grid">
    <button class="pin-btn" data-n="1">1</button><button class="pin-btn" data-n="2">2</button><button class="pin-btn" data-n="3">3</button>
    <button class="pin-btn" data-n="4">4</button><button class="pin-btn" data-n="5">5</button><button class="pin-btn" data-n="6">6</button>
    <button class="pin-btn" data-n="7">7</button><button class="pin-btn" data-n="8">8</button><button class="pin-btn" data-n="9">9</button>
    <button class="pin-btn" data-n="del" style="grid-column:1">⌫</button><button class="pin-btn" data-n="0">0</button><div></div>
  </div>
  <button class="pin-mode-btn" id="pin-change-btn" style="display:none">PIN 변경</button>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header>
    <div class="header-left">
      <button class="hamburger-btn" id="hamburger-btn"><span></span><span></span><span></span></button><button class="back-btn" onclick="history.back()">‹</button>
      <h1>📖 레시피</h1>
    </div>
    <button class="lock-btn" onclick="lockApp()">잠금</button>
  </header>
  <div class="content">
    <div class="top-bar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-box" id="search-box" placeholder="레시피 검색..."/>
      </div>
      <button class="add-recipe-btn" id="open-add-btn">+ 추가</button>
    </div>
    <div class="cat-bar" id="cat-bar">
      <button class="cat-chip active" data-cat="">전체</button>
    </div>
    <div class="recipe-grid" id="recipe-grid">
      <div class="empty-list">아직 레시피가 없어요</div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay"></div>

// ── Firestore ─────────────────────────────────────────
function initFirestore(){
  // Load cost ingredients
  onSnapshot(query(collection(db,'cost_ingredients'),orderBy('name')), snap=>{
    costIngredients = snap.docs.map(d=>({id:d.id,...d.data()}));
  });
  // Load recipes
  onSnapshot(query(collection(db,'recipes'),orderBy('name')), snap=>{
    recipes = snap.docs.map(d=>({id:d.id,...d.data()}));
    rebuildCategories();
    renderGrid(document.getElementById('search-box').value);
  });
  // Load inventory data + conversions for stock deduction
  INV_SECTIONS.forEach(sec=>{
    onSnapshot(query(collection(db,`inv_${sec.id}`),orderBy('name')), snap=>{
      invCache[sec.id] = snap.docs.map(d=>({id:d.id,...d.data()}));
    });
    getDoc(doc(db,'item_conversions',sec.id)).then(snap=>{
      if(snap.exists()) invConversions[sec.id] = snap.data()||{};
    });
  });
}

// ── Unit conversions to grams / ml ───────────────────
// All weights → grams, all volumes → ml
function toGrams(amount, unit){
  const map={g:1,Kg:1000,lb:453.592,oz:28.3495};
  return amount*(map[unit]||null);
}
function toMl(amount, unit){
  const map={ml:1,l:1000,cup:240,tbsp:15,tsp:5};
  return amount*(map[unit]||null);
}

// Get price per gram from costIngredients
function getPricePerGram(ingName){
  const found = costIngredients.find(c=>c.name.trim().toLowerCase()===ingName.trim().toLowerCase());
  if(!found) return null;
  const {price, amount, unit, density=1} = found;
  const weightUnits=['g','Kg','lb','oz'];
  const volUnits=['ml','l'];
  if(weightUnits.includes(unit)){
    const totalG = toGrams(amount,unit);
    return totalG ? price/totalG : null;
  } else if(volUnits.includes(unit)){
    const totalMl = toMl(amount,unit);
    const totalG = totalMl * density;
    return totalG ? price/totalG : null;
  }
  return null; // per 개 etc — can't convert
}

// Get price per ml from costIngredients
function getPricePerMl(ingName){
  const found = costIngredients.find(c=>c.name.trim().toLowerCase()===ingName.trim().toLowerCase());
  if(!found) return null;
  const {price, amount, unit, density=1} = found;
  const weightUnits=['g','Kg','lb','oz'];
  const volUnits=['ml','l'];
  if(volUnits.includes(unit)){
    const totalMl = toMl(amount,unit);
    return totalMl ? price/totalMl : null;
  } else if(weightUnits.includes(unit)){
    const totalG = toGrams(amount,unit);
    const totalMl = totalG / density;
    return totalMl ? price/totalMl : null;
  }
  return null;
}

function getPricePerUnit(ingName){
  const found = costIngredients.find(c=>c.name.trim().toLowerCase()===ingName.trim().toLowerCase());
  if(!found || found.unit!=='개') return null;
  return found.price / found.amount;
}

// Calculate cost for a recipe ingredient
function calcIngCost(ing){
  const {name, amount, unit} = ing;
  const amt = parseFloat(amount);
  if(!amt || !name) return null;

  const weightUnits=['g','Kg','lb','oz'];
  const volUnits=['ml','l','cup','tbsp','tsp'];

  if(weightUnits.includes(unit)){
    const grams = toGrams(amt, unit);
    const ppg = getPricePerGram(name);
    return ppg!==null && grams!==null ? ppg*grams : null;
  } else if(volUnits.includes(unit)){
    const ml = toMl(amt, unit);
    const ppm = getPricePerMl(name);
    return ppm!==null && ml!==null ? ppm*ml : null;
  } else if(unit==='개'){
    const ppu = getPricePerUnit(name);
    return ppu!==null ? ppu*amt : null;
  }
  return null;
}

function fmtCost(n){
  if(n===null) return null;
  if(n<0.01) return '$'+n.toFixed(4);
  if(n<1) return '$'+n.toFixed(3);
  return '$'+n.toFixed(2);
}

// ── Ingredient tags ───────────────────────────────────
let editingIngIdx = null;

function renderIngTags(){
  const list=document.getElementById('ing-tag-list');
  list.innerHTML='';
  currentIngredients.forEach((ing,i)=>{
    const tag=document.createElement('div');

    if(editingIngIdx===i){
      // EDIT MODE
      tag.className='ing-tag editing';
      const unitOpts=['cup','tbsp','tsp','Kg','g','l','ml','lb','oz','개','줄기','적당량'];
      tag.innerHTML=`
        <input class="ing-edit-amt" value="${ing.amount}" type="number" min="0" step="any" placeholder="양"/>
        <select class="ing-edit-unit">${unitOpts.map(u=>`<option${u===ing.unit?' selected':''}>${u}</option>`).join('')}</select>
        <input class="ing-edit-name" value="${ing.name}" placeholder="재료명"/>
        <button class="ing-edit-save">✓</button>
        <button class="ing-tag-del">✕</button>
      `;
      tag.querySelector('.ing-edit-save').addEventListener('click',()=>{
        const amt=tag.querySelector('.ing-edit-amt').value;
        const unit=tag.querySelector('.ing-edit-unit').value;
        const name=tag.querySelector('.ing-edit-name').value.trim();
        if(!name)return;
        currentIngredients[i]={name,amount:amt||'',unit};
        editingIngIdx=null;renderIngTags();
      });
      tag.querySelector('.ing-edit-name').addEventListener('keydown',e=>{
        if(e.key==='Enter') tag.querySelector('.ing-edit-save').click();
        if(e.key==='Escape'){editingIngIdx=null;renderIngTags();}
      });
      tag.querySelector('.ing-tag-del').addEventListener('click',()=>{
        currentIngredients.splice(i,1);editingIngIdx=null;renderIngTags();
      });
      list.appendChild(tag);
      // Focus name field
      setTimeout(()=>tag.querySelector('.ing-edit-amt').focus(),50);
    } else {
      // VIEW MODE - tap to edit
      tag.className='ing-tag';
      tag.innerHTML=`
        <span class="ing-tag-text">${ing.amount}${ing.unit} ${ing.name}</span>
        <button class="ing-tag-del">✕</button>
      `;
      tag.querySelector('.ing-tag-text').addEventListener('click',()=>{
        editingIngIdx=i;renderIngTags();
      });
      tag.querySelector('.ing-tag-del').addEventListener('click',()=>{
        currentIngredients.splice(i,1);if(editingIngIdx===i)editingIngIdx=null;renderIngTags();
      });
      list.appendChild(tag);
    }
  });
}

// ── Categories ────────────────────────────────────────
function rebuildCategories() {
  const catSet = new Set();
  recipes.forEach(r => { if (r.category) catSet.add(r.category); });
  allCategories = [...catSet].sort((a,b) => a.localeCompare(b,'ko'));
  renderCatBar();
  renderCatModalChips();
}

function renderCatBar() {
  const bar = document.getElementById('cat-bar');
  if (!bar) return;
  bar.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-chip' + (currentCat===''?' active':'');
  allBtn.textContent = '전체';
  allBtn.addEventListener('click', () => { currentCat=''; renderCatBar(); renderGrid(document.getElementById('search-box').value); });
  bar.appendChild(allBtn);
  allCategories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-chip' + (currentCat===cat?' active':'');
    btn.textContent = cat;
    btn.addEventListener('click', () => { currentCat=cat; renderCatBar(); renderGrid(document.getElementById('search-box').value); });
    bar.appendChild(btn);
  });
}

function renderCatModalChips() {
  const wrap = document.getElementById('cat-modal-chips');
  if (!wrap) return;
  wrap.innerHTML = '';
  allCategories.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'cat-modal-chip' + (selectedCat===cat?' selected':'');
    chip.textContent = cat;
    chip.addEventListener('click', () => {
      selectedCat = selectedCat===cat ? '' : cat;
      renderCatModalChips();
    });
    wrap.appendChild(chip);
  });
}

// ── Render grid ───────────────────────────────────────
function renderGrid(search=''){
  const grid=document.getElementById('recipe-grid');
  const filtered=recipes.filter(r=>{
    const matchSearch = r.name.toLowerCase().includes(search.toLowerCase());
    const matchCat = !currentCat || r.category===currentCat;
    return matchSearch && matchCat;
  }).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  if(!filtered.length){grid.innerHTML='<div class="empty-list">레시피가 없어요</div>';return;}
  grid.innerHTML='';
  filtered.forEach(r=>{
    const box=document.createElement('div');box.className='recipe-box';
    const ingPreview=r.ingredients?.map(i=>`${i.amount}${i.unit} ${i.name}`).join(', ')||'';
    box.innerHTML=`
      ${r.category?`<div class="recipe-box-cat">${r.category}</div>`:''}
      <div class="recipe-box-title">${r.name}</div>
      <div class="recipe-box-meta">
        ${r.serving?`<span>🍽 ${r.serving}인분</span>`:''}
        ${r.ingredients?.length?`<span>재료 ${r.ingredients.length}가지</span>`:''}
      </div>
      ${ingPreview?`<div class="recipe-box-preview">${ingPreview}</div>`:''}
    `;
    box.addEventListener('click',()=>showDetail(r.id));
    grid.appendChild(box);
  });
}
document.getElementById('search-box').addEventListener('input',function(){renderGrid(this.value);});

function showDetail(id){
  const r=recipes.find(x=>x.id===id);if(!r)return;
  currentDetailId=id;
  document.getElementById('detail-title').textContent=r.name;
  renderDetailBody(r, parseFloat(r.serving)||1);
  openDetail();
}

function renderDetailBody(r, displayServing){
  const body=document.getElementById('detail-body');
  body.innerHTML='';

  // ── Serving control ──
  const totalServing = parseFloat(r.serving)||1;
  const scWrap = document.createElement('div');
  scWrap.className='serving-control';
  scWrap.innerHTML=`
    <label>1인분 기준 보기</label>
    <input class="serving-ctrl-input" id="serving-ctrl" type="number" value="${displayServing}" min="1" step="1"/>
    <span class="serving-ctrl-unit">인분 기준</span>
  `;
  body.appendChild(scWrap);
  document.getElementById('serving-ctrl').addEventListener('change', function(){
    const v = parseFloat(this.value)||1;
    renderDetailBody(r, v);
  });

  const ratio = displayServing / totalServing; // scaling factor

  // ── Ingredients table ──
  if(r.ingredients?.length){
    const s=document.createElement('div');s.className='section-title';s.textContent='재료';body.appendChild(s);
    const card=document.createElement('div');card.className='detail-card';

    // header
    const hdr=document.createElement('div');hdr.className='ing-table-row header';
    hdr.innerHTML=`<span>재료</span><span style="text-align:right">사용량</span><span style="text-align:right">원가</span>`;
    card.appendChild(hdr);

    r.ingredients.forEach(ing=>{
      const scaledAmt = parseFloat(ing.amount)*ratio;
      const amtDisplay = scaledAmt ? (Number.isInteger(scaledAmt)?scaledAmt:scaledAmt.toFixed(2)) : ing.amount;
      const cost = calcIngCost({...ing, amount: scaledAmt||ing.amount});
      const costStr = fmtCost(cost);
      const row=document.createElement('div');row.className='ing-table-row';
      row.innerHTML=`
        <span class="ing-col-name">${ing.name}</span>
        <span class="ing-col-amt">${amtDisplay} ${ing.unit}</span>
        <span class="ing-col-cost ${costStr?'':'no-data'}">${costStr||'—'}</span>
      `;
      card.appendChild(row);
    });
    body.appendChild(card);
  }

  // ── Notes ──
  if(r.notes){
    const s=document.createElement('div');s.className='section-title';s.textContent='조리 방법';body.appendChild(s);
    const card=document.createElement('div');card.className='detail-card';
    const p=document.createElement('p');p.className='detail-notes';p.textContent=r.notes;
    card.appendChild(p);body.appendChild(card);
  }

  // ── Cost summary ──
  const s2=document.createElement('div');s2.className='section-title';s2.textContent='원가 분석';body.appendChild(s2);
  const costs = (r.ingredients||[]).map(ing=>calcIngCost({...ing, amount:parseFloat(ing.amount)*ratio||ing.amount}));
  const knownCosts = costs.filter(c=>c!==null);
  const unknownCount = costs.filter(c=>c===null).length;
  const totalKnown = knownCosts.reduce((a,b)=>a+b,0);
  const hasAll = unknownCount===0 && knownCosts.length>0;

  const summary=document.createElement('div');summary.className='cost-summary';

  if(knownCosts.length===0){
    summary.innerHTML=`<p style="font-size:0.82rem;color:var(--muted);text-align:center">원가계산 탭에 재료 가격을 먼저 등록해주세요</p>`;
  } else {
    const perServingTotal = totalKnown; // already scaled to displayServing
    const perOneServing   = totalKnown / displayServing;
    summary.innerHTML=`
      <div class="cost-row">
        <span class="cost-label">📦 ${displayServing}인분 총 원가 ${!hasAll?`<span style="font-size:0.7rem;color:var(--muted)">(${unknownCount}가지 미등록)</span>`:''}</span>
        <span class="cost-val">${fmtCost(perServingTotal)}</span>
      </div>
      <div class="cost-divider"></div>
      <div class="cost-row">
        <span class="cost-label">🍽 1인분 원가</span>
        <span class="cost-val per-serving">${fmtCost(perOneServing)}</span>
      </div>
    `;
  }
  body.appendChild(summary);

  // ── Stock deduction preview ──
  const s3=document.createElement('div');s3.className='section-title';s3.textContent='재고 반영';body.appendChild(s3);

  // Build deduction map: find matching inv items and calculate amounts
  const deductions = buildDeductions(r.ingredients||[], displayServing, totalServing);

  const preview=document.createElement('div');preview.className='stock-preview';
  const phdr=document.createElement('div');phdr.className='stock-preview-hdr';
  phdr.textContent=`재료 사용 시 재고에서 차감될 수량 (${displayServing}인분 기준)`;
  preview.appendChild(phdr);

  if(!deductions.length){
    const e=document.createElement('div');e.style.cssText='padding:14px;text-align:center;color:var(--muted);font-size:0.8rem';
    e.textContent='재고에 매칭되는 재료가 없어요';preview.appendChild(e);
  } else {
    deductions.forEach(d=>{
      const row=document.createElement('div');row.className='stock-preview-row';
      if(d.invItem){
        const curRemaining=(d.invItem.remaining!==undefined&&d.invItem.remaining!==null)?d.invItem.remaining:d.invItem.qty;
        const afterRemaining=Math.max(0,curRemaining-d.deductGrams);
        // Convert back to secondary unit if conversion exists
        const conv=d.conv;
        let curDisplay,afterDisplay;
        if(conv&&conv.ratio){
          curDisplay=`${(curRemaining/conv.ratio).toFixed(1)} ${conv.outUnit}`;
          afterDisplay=`${(afterRemaining/conv.ratio).toFixed(1)} ${conv.outUnit}`;
        } else {
          curDisplay=`${curRemaining} ${d.invItem.unit}`;
          afterDisplay=`${afterRemaining} ${d.invItem.unit}`;
        }
        row.innerHTML=`<span class="stock-preview-name">${d.name}</span><span class="stock-preview-val">${curDisplay} → ${afterDisplay}</span>`;
      } else {
        row.innerHTML=`<span class="stock-preview-name">${d.name}</span><span class="stock-preview-val no-match">재고 없음</span>`;
      }
      preview.appendChild(row);
    });
  }
  body.appendChild(preview);

  // Apply button
  const applyBtn=document.createElement('button');
  applyBtn.className='apply-stock-btn';
  applyBtn.innerHTML='📦 재고에 반영하기';
  applyBtn.addEventListener('click',async()=>{
    const matched=deductions.filter(d=>d.invItem);
    if(!matched.length){showToast('재고에 매칭된 재료가 없어요');return;}
    applyBtn.disabled=true;applyBtn.textContent='반영 중...';
    for(const d of matched){
      const curR=(d.invItem.remaining!==undefined&&d.invItem.remaining!==null)?d.invItem.remaining:d.invItem.qty;
      const newR=Math.max(0,curR-d.deductGrams);
      // Find which section this item is in
      for(const sec of INV_SECTIONS){
        const found=invCache[sec.id].find(i=>i.id===d.invItem.id);
        if(found){
          await updateDoc(doc(db,`inv_${sec.id}`,d.invItem.id),{remaining:parseFloat(newR.toFixed(4))});
          break;
        }
      }
    }
    showToast(`${matched.length}개 재료 재고 반영됨 ✓`);
    applyBtn.disabled=false;applyBtn.innerHTML='📦 재고에 반영하기';
    renderDetailBody(r, displayServing);
  });
  body.appendChild(applyBtn);
}

// ── Build deductions ──────────────────────────────────
// Convert recipe ingredient amount to inventory base unit (grams/ml)
function buildDeductions(ingredients, displayServing, totalServing){
  const ratio = displayServing / totalServing;
  return ingredients.map(ing=>{
    const amt = parseFloat(ing.amount) * ratio;
    if(!amt) return null;
    // Convert recipe unit → grams or ml
    const grams = convertToBaseUnit(amt, ing.unit);
    if(grams === null) return {name:ing.name,deductGrams:amt,unit:ing.unit,invItem:null,conv:null};

    // Find matching inv item across all sections
    let matchedItem=null, matchedConv=null, matchedSec=null;
    for(const sec of INV_SECTIONS){
      const item=invCache[sec.id].find(i=>i.name.trim().toLowerCase()===ing.name.trim().toLowerCase());
      if(item){
        matchedItem=item;
        matchedConv=(invConversions[sec.id]&&invConversions[sec.id][item.name])||null;
        matchedSec=sec;
        break;
      }
    }

    if(!matchedItem) return {name:ing.name,deductGrams:grams,unit:ing.unit,invItem:null,conv:matchedConv};

    // Convert recipe amount to inv base unit
    // inv stores in stockUnit (e.g. grams if Kg, ml if l)
    const invUnit=matchedItem.unit;
    const deductInInvUnit = convertToSameUnit(grams, ing.unit, invUnit);

    return {name:ing.name,deductGrams:deductInInvUnit!==null?deductInInvUnit:grams,unit:ing.unit,invItem:matchedItem,conv:matchedConv};
  }).filter(d=>d!==null);
}

// Convert amount in any unit to grams (weight) or ml (volume)
function convertToBaseUnit(amount, unit){
  const weightMap={g:1,Kg:1000,lb:453.592,oz:28.3495};
  const volMap={ml:1,l:1000,cup:240,tbsp:15,tsp:5,Gal:3785.41};
  if(weightMap[unit]!==undefined) return amount*weightMap[unit]; // → grams
  if(volMap[unit]!==undefined) return amount*volMap[unit]; // → ml
  return null;
}

// Convert from recipe unit to inventory base unit
function convertToSameUnit(amount, fromUnit, toUnit){
  const weightMap={g:1,Kg:1000,lb:453.592,oz:28.3495};
  const volMap={ml:1,l:1000,cup:240,tbsp:15,tsp:5,Gal:3785.41};
  // Both weight
  if(weightMap[fromUnit]!==undefined && weightMap[toUnit]!==undefined){
    return amount * weightMap[fromUnit] / weightMap[toUnit];
  }
  // Both volume
  if(volMap[fromUnit]!==undefined && volMap[toUnit]!==undefined){
    return amount * volMap[fromUnit] / volMap[toUnit];
  }
  // Gal special
  if(fromUnit==='Gal'&&toUnit==='ml') return amount*3785.41;
  if(fromUnit==='ml'&&toUnit==='Gal') return amount/3785.41;
  return null;
}

// ── Edit / Delete ─────────────────────────────────────
document.getElementById('edit-btn').addEventListener('click',()=>{
  if(!currentDetailId)return;
  const r=recipes.find(x=>x.id===currentDetailId);if(!r)return;
  closeDetail();
  editingId=r.id;
  document.getElementById('modal-title').textContent='레시피 수정';
  document.getElementById('recipe-name-in').value=r.name;
  document.getElementById('recipe-notes').value=r.notes||'';
  document.getElementById('recipe-serving').value=r.serving||'';
  currentIngredients=[...(r.ingredients||[])];
  renderIngTags();openModal();
});
document.getElementById('delete-btn').addEventListener('click',async()=>{
  if(!currentDetailId)return;
  if(!confirm('정말 삭제할까요?'))return;
  await deleteDoc(doc(db,'recipes',currentDetailId));
  closeDetail();showToast('삭제됨');
});
