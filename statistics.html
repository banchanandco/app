<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>통계 — Banchan and Co</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#9caf88"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Banchan"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--accent:#9caf88;--accent-dark:#7a9068;--accent-bg:#f0f5ec;--accent-light:#c8d9bc;--bg:#f5f4f0;--surface:#fff;--border:#dedad3;--subtle:#eceae5;--muted:#9a9488;--body:#4a4540;--heading:#2a2520;--urgent:#e05555;--warn:#e09020}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--body);min-height:100vh;padding-bottom:40px}
    header{background:var(--accent);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px}
    .back-btn{background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;line-height:1}
    header h1{font-size:1.05rem;font-weight:700;color:#fff}
    .header-right{display:flex;align-items:center;gap:10px}
    .user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover}
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
    .drawer-overlay.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;left:-280px;top:0;bottom:0;width:280px;background:var(--surface);z-index:301;transition:left .25s;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.12)}
    .drawer.open{left:0}
    .drawer-header{background:var(--accent);padding:44px 20px 20px;display:flex;flex-direction:column;gap:6px}
    .drawer-avatar{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover;margin-bottom:4px}
    .drawer-name{font-size:1rem;font-weight:700;color:#fff}
    .drawer-email{font-size:0.73rem;color:rgba(255,255,255,0.65)}
    .drawer-menu{flex:1;padding:10px 0}
    .drawer-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:0.9rem;color:var(--body);cursor:pointer}
    .drawer-item:active{background:var(--accent-bg)}
    .drawer-item.active{color:var(--accent-dark);font-weight:600;background:var(--accent-bg)}
    .drawer-item .di-icon{font-size:1.2rem}
    .drawer-logout{margin:0 16px 20px;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--muted);cursor:pointer;width:calc(100% - 32px)}

    /* PERIOD TABS */
    .period-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:100}
    .period-btn{flex:1;padding:12px 6px;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
    .period-btn.active{color:var(--accent-dark);border-bottom-color:var(--accent)}

    /* NAV TABS (within period) */
    .nav-tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 0}
    .nav-tabs::-webkit-scrollbar{display:none}
    .nav-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;color:var(--muted);cursor:pointer}
    .nav-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

    .content{padding:14px;display:flex;flex-direction:column;gap:12px}

    /* SUMMARY GRID */
    .sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .sum-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:12px 10px;text-align:center}
    .sum-num{font-family:'DM Mono',monospace;font-size:1.5rem;font-weight:600;color:var(--accent-dark)}
    .sum-num.urgent{color:var(--urgent)}
    .sum-num.warn{color:var(--warn)}
    .sum-label{font-size:0.68rem;color:var(--muted);margin-top:3px}

    /* STATS CARD */
    .stats-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden}
    .stats-card-hdr{padding:11px 16px;border-bottom:1px solid var(--subtle);font-size:0.82rem;font-weight:700;color:var(--heading)}
    .bar-wrap{padding:10px 16px;border-bottom:1px solid var(--subtle)}
    .bar-wrap:last-child{border-bottom:none}
    .bar-label{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--body);margin-bottom:5px}
    .bar-bg{background:var(--subtle);border-radius:6px;height:7px;overflow:hidden}
    .bar-fill{height:100%;background:var(--accent);border-radius:6px;transition:width .4s ease}
    .bar-fill.out{background:var(--warn)}

    /* ITEM LIST */
    .stats-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--subtle);font-size:0.84rem}
    .stats-row:last-child{border-bottom:none}
    .stats-row .sname{color:var(--body);flex:1}
    .stats-row .sqty{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--accent-dark);white-space:nowrap}
    .stats-row .sqty.low{color:var(--urgent)}
    .stats-row .sqty.warn{color:var(--warn)}
    .stats-empty{padding:24px;text-align:center;color:var(--muted);font-size:0.82rem}
    .sec-label{font-size:0.72rem;font-weight:700;color:var(--muted);background:var(--subtle);padding:5px 16px;border-bottom:1px solid var(--subtle)}
  </style>
</head>
<body>
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <img class="drawer-avatar" id="drawer-avatar" src="" alt=""/>
    <div class="drawer-name" id="drawer-name"></div>
    <div class="drawer-email" id="drawer-email"></div>
  </div>
  <div class="drawer-menu">
    <div class="drawer-item" onclick="location.href='main.html'"><span class="di-icon">🏠</span> 홈</div>
    <div class="drawer-item" onclick="location.href='inventory.html'"><span class="di-icon">📋</span> 재고 관리</div>
    <div class="drawer-item active"><span class="di-icon">📊</span> 통계</div>
    <div class="drawer-item" onclick="location.href='schedule.html'"><span class="di-icon">📅</span> 스케줄</div>
    <div class="drawer-item" onclick="location.href='cost.html'"><span class="di-icon">🧮</span> 원가계산</div>
    <div class="drawer-item" onclick="location.href='recipe.html'"><span class="di-icon">📖</span> 레시피</div>
  </div>
  <button class="drawer-logout" id="logout-btn">로그아웃</button>
</div>

<header>
  <div class="header-left">
    <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
    <button class="back-btn" onclick="location.href='main.html'">‹</button>
    <h1>통계</h1>
  </div>
  <div class="header-right">
    <img class="user-avatar" id="header-avatar" src="" alt=""/>
  </div>
</header>

<!-- PERIOD TABS -->
<div class="period-bar">
  <button class="period-btn active" data-period="day">일간</button>
  <button class="period-btn" data-period="week">주간</button>
  <button class="period-btn" data-period="month">월간</button>
</div>

<!-- NAV TABS: 입고 / 재고 / 출고 -->
<div class="nav-tabs" id="nav-tabs">
  <button class="nav-tab active" data-view="inbound">📥 입고</button>
  <button class="nav-tab" data-view="stock">📦 재고</button>
  <button class="nav-tab" data-view="outbound">📤 출고</button>
</div>

<div class="content" id="content">
  <div style="padding:40px 0;text-align:center;color:var(--muted)">로딩 중...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbApp = initializeApp({apiKey:"AIzaSyArW3yhj81OJpOkCEYfyaelgcdo8o_IAPw",authDomain:"banchan-inventory-144bd.firebaseapp.com",projectId:"banchan-inventory-144bd",storageBucket:"banchan-inventory-144bd.firebasestorage.app",messagingSenderId:"1022526862273",appId:"1:1022526862273:web:12a025d9db24c7c6b83540"});
const auth = getAuth(fbApp), db = getFirestore(fbApp);

const SECTIONS = [
  {id:'food',      label:'식재료',   icon:'🥩'},
  {id:'container', label:'컨테이너', icon:'📦'},
  {id:'misc',      label:'소모품',   icon:'🪣'},
  {id:'clean',     label:'청소',     icon:'🧹'},
  {id:'other',     label:'기타',     icon:'📂'},
];

const cache = {};
SECTIONS.forEach(s => cache[s.id] = []);
let loaded = 0;
let currentPeriod = 'day';
let currentView   = 'inbound';

// ── Auth ──────────────────────────────────────────────
const loadedSecs = new Set();
let firestoreStarted = false;

onAuthStateChanged(auth, user => {
  if (!user) { location.href='index.html'; return; }
  document.getElementById('header-avatar').src = user.photoURL||'';
  document.getElementById('drawer-avatar').src  = user.photoURL||'';
  document.getElementById('drawer-name').textContent  = user.displayName||'';
  document.getElementById('drawer-email').textContent = user.email||'';

  if (firestoreStarted) return;
  firestoreStarted = true;

  SECTIONS.forEach(sec => {
    const q = query(collection(db, `inv_${sec.id}`), orderBy('createdAt'));
    onSnapshot(q, snap => {
      cache[sec.id] = snap.docs.map(d => ({id:d.id,...d.data()}));
      loadedSecs.add(sec.id);
      render();
    }, () => {
      loadedSecs.add(sec.id);
      render();
    });
  });
});

// ── Drawer ────────────────────────────────────────────
document.getElementById('hamburger-btn').addEventListener('click',()=>{document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');});
document.getElementById('drawer-overlay').addEventListener('click',()=>{document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');});
document.getElementById('logout-btn').addEventListener('click',async()=>{await signOut(auth);location.href='index.html';});

// ── Period tabs ───────────────────────────────────────
document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.period;
    render();
  });
});

// ── View tabs ─────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    render();
  });
});

// ── Date range helpers ────────────────────────────────
function getRange(period) {
  const now = new Date();
  let start, end;
  if (period === 'day') {
    start = new Date(now); start.setHours(0,0,0,0);
    end   = new Date(now); end.setHours(23,59,59,999);
  } else if (period === 'week') {
    const day = now.getDay();
    start = new Date(now); start.setDate(now.getDate() - day + 1); start.setHours(0,0,0,0);
    end   = new Date(start); end.setDate(start.getDate()+6); end.setHours(23,59,59,999);
  } else {
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    end   = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59,999);
  }
  return { start: start.getTime(), end: end.getTime() };
}

function periodLabel(period) {
  const now = new Date();
  if (period === 'day') return `${now.getMonth()+1}/${now.getDate()} (오늘)`;
  if (period === 'week') {
    const day = now.getDay();
    const mon = new Date(now); mon.setDate(now.getDate()-day+1);
    const sun = new Date(mon); sun.setDate(mon.getDate()+6);
    return `${mon.getMonth()+1}/${mon.getDate()} – ${sun.getMonth()+1}/${sun.getDate()}`;
  }
  return `${now.getFullYear()}년 ${now.getMonth()+1}월`;
}

// ── Main render ───────────────────────────────────────
function render() {
  const {start, end} = getRange(currentPeriod);
  const content = document.getElementById('content');
  content.innerHTML = '';

  // Period label
  const pLabel = document.createElement('div');
  pLabel.style.cssText='font-size:0.8rem;color:var(--muted);padding:4px 2px';
  pLabel.textContent = periodLabel(currentPeriod);
  content.appendChild(pLabel);

  if (currentView === 'inbound') renderInbound(content, start, end);
  else if (currentView === 'stock') renderStock(content);
  else renderOutbound(content, start, end);
}

// ── INBOUND stats ─────────────────────────────────────
function renderInbound(content, start, end) {
  // Gather items added in period
  const allItems = SECTIONS.flatMap(sec =>
    cache[sec.id]
      .filter(i => i.createdAt >= start && i.createdAt <= end)
      .map(i => ({...i, sec}))
  );

  // Summary
  const totalQty = allItems.reduce((a,i) => a + (i.qty||0), 0);
  const grid = document.createElement('div');
  grid.className = 'sum-grid';
  grid.innerHTML = `
    <div class="sum-card"><div class="sum-num">${allItems.length}</div><div class="sum-label">입고 건수</div></div>
    <div class="sum-card"><div class="sum-num">${SECTIONS.filter(s=>allItems.some(i=>i.sec.id===s.id)).length}</div><div class="sum-label">카테고리</div></div>
    <div class="sum-card"><div class="sum-num">${totalQty % 1 === 0 ? totalQty : totalQty.toFixed(1)}</div><div class="sum-label">총 수량</div></div>
  `;
  content.appendChild(grid);

  // By section bar
  const bySec = {};
  SECTIONS.forEach(s => bySec[s.id] = 0);
  allItems.forEach(i => bySec[i.sec.id] += (i.qty||1));
  const maxVal = Math.max(...Object.values(bySec), 1);

  const secCard = document.createElement('div');
  secCard.className = 'stats-card';
  secCard.innerHTML = '<div class="stats-card-hdr">카테고리별 입고</div>';
  SECTIONS.forEach(sec => {
    const cnt = allItems.filter(i=>i.sec.id===sec.id).length;
    if (!cnt) return;
    const qty = bySec[sec.id];
    const pct = Math.round((qty/maxVal)*100);
    const bw = document.createElement('div');bw.className='bar-wrap';
    bw.innerHTML=`<div class="bar-label"><span>${sec.icon} ${sec.label}</span><span>${cnt}건 / ${qty%1===0?qty:qty.toFixed(1)} 단위</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>`;
    secCard.appendChild(bw);
  });
  if (!allItems.length) secCard.innerHTML += '<div class="stats-empty">이 기간에 입고된 항목이 없어요</div>';
  content.appendChild(secCard);

  // Item list by section
  const listCard = document.createElement('div');
  listCard.className = 'stats-card';
  listCard.innerHTML = '<div class="stats-card-hdr">입고 항목 목록</div>';
  let hasAny = false;
  SECTIONS.forEach(sec => {
    const items = allItems.filter(i=>i.sec.id===sec.id).sort((a,b)=>b.createdAt-a.createdAt);
    if (!items.length) return;
    hasAny = true;
    const sl = document.createElement('div');sl.className='sec-label';sl.textContent=`${sec.icon} ${sec.label}`;
    listCard.appendChild(sl);
    items.forEach(item => {
      const row = document.createElement('div');row.className='stats-row';
      const d = new Date(item.createdAt);
      const timeStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      row.innerHTML=`<span class="sname">${item.name}</span><span class="sqty">${item.qty} ${item.unit}</span><span style="font-size:0.68rem;color:var(--muted);margin-left:8px">${timeStr}</span>`;
      listCard.appendChild(row);
    });
  });
  if (!hasAny) listCard.innerHTML += '<div class="stats-empty">이 기간에 입고된 항목이 없어요</div>';
  content.appendChild(listCard);
}

// ── STOCK stats ───────────────────────────────────────
function renderStock(content) {
  const allItems = SECTIONS.flatMap(sec => cache[sec.id].map(i=>({...i,sec})));
  const total    = allItems.length;
  const low      = allItems.filter(i=>{const r=i.remaining??i.qty;const p=i.qty>0?(r/i.qty)*100:0;return p<=15;}).length;
  const warn     = allItems.filter(i=>{const r=i.remaining??i.qty;const p=i.qty>0?(r/i.qty)*100:0;return p>15&&p<=40;}).length;

  const grid = document.createElement('div');grid.className='sum-grid';
  grid.innerHTML=`
    <div class="sum-card"><div class="sum-num">${total}</div><div class="sum-label">전체 항목</div></div>
    <div class="sum-card"><div class="sum-num warn">${warn}</div><div class="sum-label">주문 요망</div></div>
    <div class="sum-card"><div class="sum-num urgent">${low}</div><div class="sum-label">긴급 주문</div></div>
  `;
  content.appendChild(grid);

  // By section bar (잔여 비율 평균)
  const secCard = document.createElement('div');secCard.className='stats-card';
  secCard.innerHTML='<div class="stats-card-hdr">카테고리별 재고 현황</div>';
  SECTIONS.forEach(sec => {
    const items = cache[sec.id];
    if (!items.length) return;
    const avgPct = items.reduce((a,i)=>{const r=i.remaining??i.qty;return a+(i.qty>0?(r/i.qty)*100:0);},0)/items.length;
    const bw=document.createElement('div');bw.className='bar-wrap';
    bw.innerHTML=`<div class="bar-label"><span>${sec.icon} ${sec.label}</span><span>${items.length}개 · 평균 ${avgPct.toFixed(0)}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${avgPct.toFixed(1)}%"></div></div>`;
    secCard.appendChild(bw);
  });
  if (!allItems.length) secCard.innerHTML+='<div class="stats-empty">재고 항목이 없어요</div>';
  content.appendChild(secCard);

  // Full stock list
  const listCard=document.createElement('div');listCard.className='stats-card';
  listCard.innerHTML='<div class="stats-card-hdr">전체 재고 목록</div>';
  let hasAny=false;
  SECTIONS.forEach(sec=>{
    const items=[...cache[sec.id]].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    if(!items.length)return;hasAny=true;
    const sl=document.createElement('div');sl.className='sec-label';sl.textContent=`${sec.icon} ${sec.label}`;
    listCard.appendChild(sl);
    items.forEach(item=>{
      const r=item.remaining??item.qty;
      const pct=item.qty>0?(r/item.qty)*100:0;
      const cls=pct<=15?'low':pct<=40?'warn':'';
      const row=document.createElement('div');row.className='stats-row';
      row.innerHTML=`<span class="sname">${item.name}</span><span class="sqty ${cls}">${r} / ${item.qty} ${item.unit}</span>`;
      listCard.appendChild(row);
    });
  });
  if(!hasAny)listCard.innerHTML+='<div class="stats-empty">재고 항목이 없어요</div>';
  content.appendChild(listCard);
}

// ── OUTBOUND stats ────────────────────────────────────
function renderOutbound(content, start, end) {
  // 출고 = 입고 qty - remaining, 기간 내 createdAt 기준
  const allItems = SECTIONS.flatMap(sec =>
    cache[sec.id]
      .filter(i => i.createdAt >= start && i.createdAt <= end)
      .map(i => {
        const outQty = (i.qty||0) - (i.remaining??i.qty||0);
        return {...i, outQty: Math.max(0, outQty), sec};
      })
  ).filter(i => i.outQty > 0);

  const totalOut = allItems.reduce((a,i)=>a+i.outQty,0);
  const grid=document.createElement('div');grid.className='sum-grid';
  grid.innerHTML=`
    <div class="sum-card"><div class="sum-num">${allItems.length}</div><div class="sum-label">출고 품목</div></div>
    <div class="sum-card"><div class="sum-num">${totalOut%1===0?totalOut:totalOut.toFixed(1)}</div><div class="sum-label">총 출고량</div></div>
    <div class="sum-card"><div class="sum-num">${SECTIONS.filter(s=>allItems.some(i=>i.sec.id===s.id)).length}</div><div class="sum-label">카테고리</div></div>
  `;
  content.appendChild(grid);

  // By section bar
  const bySec={};SECTIONS.forEach(s=>bySec[s.id]=0);
  allItems.forEach(i=>bySec[i.sec.id]+=i.outQty);
  const maxVal=Math.max(...Object.values(bySec),1);
  const secCard=document.createElement('div');secCard.className='stats-card';
  secCard.innerHTML='<div class="stats-card-hdr">카테고리별 출고</div>';
  SECTIONS.forEach(sec=>{
    const qty=bySec[sec.id];if(!qty)return;
    const cnt=allItems.filter(i=>i.sec.id===sec.id).length;
    const pct=Math.round((qty/maxVal)*100);
    const bw=document.createElement('div');bw.className='bar-wrap';
    bw.innerHTML=`<div class="bar-label"><span>${sec.icon} ${sec.label}</span><span>${cnt}건 / ${qty%1===0?qty:qty.toFixed(1)} 단위</span></div><div class="bar-bg"><div class="bar-fill out" style="width:${pct}%"></div></div>`;
    secCard.appendChild(bw);
  });
  if(!allItems.length)secCard.innerHTML+='<div class="stats-empty">이 기간에 출고된 항목이 없어요</div>';
  content.appendChild(secCard);

  // Item list
  const listCard=document.createElement('div');listCard.className='stats-card';
  listCard.innerHTML='<div class="stats-card-hdr">출고 항목 목록</div>';
  let hasAny=false;
  SECTIONS.forEach(sec=>{
    const items=allItems.filter(i=>i.sec.id===sec.id).sort((a,b)=>b.outQty-a.outQty);
    if(!items.length)return;hasAny=true;
    const sl=document.createElement('div');sl.className='sec-label';sl.textContent=`${sec.icon} ${sec.label}`;
    listCard.appendChild(sl);
    items.forEach(item=>{
      const row=document.createElement('div');row.className='stats-row';
      row.innerHTML=`<span class="sname">${item.name}</span><span class="sqty">${item.outQty%1===0?item.outQty:item.outQty.toFixed(2)} ${item.unit} 출고</span>`;
      listCard.appendChild(row);
    });
  });
  if(!hasAny)listCard.innerHTML+='<div class="stats-empty">이 기간에 출고된 항목이 없어요</div>';
  content.appendChild(listCard);
}
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/app/sw.js').catch(()=>{});}</script>
</body>
</html>
