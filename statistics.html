<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>통계 — Banchan and Co</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#9caf88"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Banchan"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--accent:#9caf88;--accent-dark:#7a9068;--accent-bg:#f0f5ec;--accent-light:#c8d9bc;--bg:#f5f4f0;--surface:#fff;--border:#dedad3;--subtle:#eceae5;--muted:#9a9488;--body:#4a4540;--heading:#2a2520;--urgent:#e05555;--warn:#e09020}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--body);min-height:100vh;padding-bottom:40px}
    header{background:var(--accent);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px}
    .back-btn{background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;line-height:1}
    header h1{font-size:1.05rem;font-weight:700;color:#fff}
    .user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover}
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
    .drawer-overlay.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;left:-280px;top:0;bottom:0;width:280px;background:var(--surface);z-index:301;transition:left .25s;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.12)}
    .drawer.open{left:0}
    .drawer-header{background:var(--accent);padding:44px 20px 20px;display:flex;flex-direction:column;gap:6px}
    .drawer-avatar{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover;margin-bottom:4px}
    .drawer-name{font-size:1rem;font-weight:700;color:#fff}
    .drawer-email{font-size:0.73rem;color:rgba(255,255,255,0.65)}
    .drawer-menu{flex:1;padding:10px 0}
    .drawer-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:0.9rem;color:var(--body);cursor:pointer}
    .drawer-item:active{background:var(--accent-bg)}
    .drawer-item.active{color:var(--accent-dark);font-weight:600;background:var(--accent-bg)}
    .drawer-item .di-icon{font-size:1.2rem}
    .drawer-logout{margin:0 16px 20px;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--muted);cursor:pointer;width:calc(100% - 32px)}
    .sec-tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:100}
    .sec-tab{flex:1;padding:13px 6px;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
    .sec-tab.active{color:var(--accent-dark);border-bottom-color:var(--accent)}
    .period-bar{display:flex;gap:6px;padding:12px 14px 0}
    .period-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;color:var(--muted);cursor:pointer}
    .period-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .content{padding:12px 14px;display:flex;flex-direction:column;gap:12px}
    .sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .sum-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:14px 10px;text-align:center}
    .sum-num{font-family:'DM Mono',monospace;font-size:1.3rem;font-weight:600;color:var(--accent-dark);line-height:1}
    .sum-num.warn{color:var(--warn)}
    .sum-num.urgent{color:var(--urgent)}
    .sum-label{font-size:0.67rem;color:var(--muted);margin-top:4px}
    .card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:8px}
    .card-hdr{padding:11px 16px;border-bottom:1px solid var(--subtle);font-size:0.82rem;font-weight:700;color:var(--heading)}
    .bar-wrap{padding:12px 16px;border-bottom:1px solid var(--subtle);transition:background 0.2s;cursor:pointer}
    .bar-wrap:active{background:var(--accent-bg)}
    .bar-label{display:flex;justify-content:space-between;font-size:0.76rem;color:var(--body);margin-bottom:6px}
    .bar-bg{background:var(--subtle);border-radius:6px;height:8px;overflow:hidden}
    .bar-fill{height:100%;border-radius:6px;transition:width .4s ease}
    .bar-fill.in{background:var(--accent)}
    .bar-fill.out{background:var(--warn)}
    .bar-fill.stock{background:var(--accent-dark)}
    .detail-list{background:var(--accent-bg);padding:4px 0}
    .list-row{display:flex;align-items:center;justify-content:space-between;padding:8px 24px;border-bottom:1px solid rgba(0,0,0,0.03);font-size:0.8rem}
    .list-row:last-child{border-bottom:none}
    .list-name{color:var(--body);flex:1}
    .list-val{font-family:'DM Mono',monospace;font-size:0.75rem;white-space:nowrap;margin-left:8px}
    .list-val.ok{color:var(--accent-dark)}
    .list-val.warn{color:var(--warn)}
    .list-val.urgent{color:var(--urgent)}
    .empty{padding:40px;text-align:center;color:var(--muted);font-size:0.82rem}
  </style>
</head>
<body>
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <img class="drawer-avatar" id="drawer-avatar" src="" alt=""/>
    <div class="drawer-name" id="drawer-name"></div>
    <div class="drawer-email" id="drawer-email"></div>
  </div>
  <div class="drawer-menu">
    <div class="drawer-item" onclick="location.href='main.html'"><span class="di-icon">🏠</span> 홈</div>
    <div class="drawer-item" onclick="location.href='inventory.html'"><span class="di-icon">📋</span> 재고 관리</div>
    <div class="drawer-item active"><span class="di-icon">📊</span> 통계</div>
    <div class="drawer-item" onclick="location.href='schedule.html'"><span class="di-icon">📅</span> 스케줄</div>
    <div class="drawer-item" onclick="location.href='cost.html'"><span class="di-icon">🧮</span> 원가계산</div>
    <div class="drawer-item" onclick="location.href='recipe.html'"><span class="di-icon">📖</span> 레시피</div>
  </div>
  <button class="drawer-logout" id="logout-btn">로그아웃</button>
</div>
<header>
  <div class="header-left">
    <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
    <button class="back-btn" onclick="location.href='main.html'">‹</button>
    <h1>통계</h1>
  </div>
  <div class="header-right"><img class="user-avatar" id="header-avatar" src="" alt=""/></div>
</header>
<div class="sec-tab-bar">
  <button class="sec-tab active" data-sec="inbound">📥 입고</button>
  <button class="sec-tab" data-sec="stock">📦 재고</button>
  <button class="sec-tab" data-sec="outbound">📤 출고</button>
</div>
<div class="period-bar">
  <button class="period-btn active" data-p="day">오늘</button>
  <button class="period-btn" data-p="week">주간</button>
  <button class="period-btn" data-p="month">월간</button>
</div>
<div class="content" id="content">
  <div class="empty">데이터를 불러오는 중...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query, orderBy, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyArW3yhj81OJpOkCEYfyaelgcdo8o_IAPw",
  authDomain:"banchan-inventory-144bd.firebaseapp.com",
  projectId:"banchan-inventory-144bd",
  storageBucket:"banchan-inventory-144bd.firebasestorage.app",
  messagingSenderId:"1022526862273",
  appId:"1:1022526862273:web:12a025d9db24c7c6b83540"
});
const auth = getAuth(app);
const db = getFirestore(app);

const SECTIONS = [
  {id:'food',label:'식재료',icon:'🥩'},
  {id:'container',label:'컨테이너',icon:'📦'},
  {id:'misc',label:'소모품',icon:'🪣'},
  {id:'clean',label:'청소',icon:'🧹'},
  {id:'other',label:'기타',icon:'📂'}
];

let cache = {};
let conversions = {};
let curSec = 'inbound';
let curPeriod = 'day';
let expandedId = null;

// Drawer & UI
document.getElementById('hamburger-btn').onclick=()=>{document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');};
document.getElementById('drawer-overlay').onclick=()=>{document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');};
document.getElementById('logout-btn').onclick=async()=>{await signOut(auth);location.href='index.html';};

// Tabs
document.querySelectorAll('.sec-tab').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.sec-tab').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); curSec=b.dataset.sec; expandedId=null; render();
}));
document.querySelectorAll('.period-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.period-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); curPeriod=b.dataset.p; expandedId=null; render();
}));

// Auth
onAuthStateChanged(auth, user => {
  if (!user) { location.href='index.html'; return; }
  document.getElementById('header-avatar').src = user.photoURL||'';
  document.getElementById('drawer-avatar').src  = user.photoURL||'';
  document.getElementById('drawer-name').textContent  = user.displayName||'';
  document.getElementById('drawer-email').textContent = user.email||'';
  initData();
});

async function initData() {
  // Load conversions first
  for(const sec of SECTIONS){
    const convRef = doc(db, 'item_conversions', sec.id);
    const snap = await getDoc(convRef);
    if(snap.exists()) conversions[sec.id] = snap.data();
  }
  
  // Start data sync
  SECTIONS.forEach(sec => {
    onSnapshot(query(collection(db, 'inv_'+sec.id), orderBy('createdAt')), snap => {
      cache[sec.id] = snap.docs.map(d=>({id:d.id,...d.data()}));
      render();
    }, err => console.error(sec.id, err));
  });
}

function getRange() {
  const now = new Date();
  let s,e;
  if (curPeriod==='day'){s=new Date(now);s.setHours(0,0,0,0);e=new Date(now);e.setHours(23,59,59,999);}
  else if (curPeriod==='week'){const d=now.getDay();s=new Date(now);s.setDate(now.getDate()-d+(d===0?-6:1));s.setHours(0,0,0,0);e=new Date(s);e.setDate(s.getDate()+6);e.setHours(23,59,59,999);}
  else{s=new Date(now.getFullYear(),now.getMonth(),1);e=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59,999);}
  return {s:s.getTime(), e:e.getTime()};
}

function fmt(n){if(!n && n!==0)return '0';const v=parseFloat(n);return Number.isInteger(v)?v:v.toFixed(1);}

// Get input unit value (e.g., box count)
function getInputVal(item, secId) {
  const conv = conversions[secId] && conversions[secId][item.name];
  if (conv && item.inboundQty) {
    return { qty: item.inboundQty, unit: item.inboundUnit };
  }
  const r = (item.remaining !== undefined) ? item.remaining : item.qty;
  return { qty: r, unit: item.unit };
}

// Get percentage based on original input amount
function getPct(item, secId) {
  const conv = conversions[secId] && conversions[secId][item.name];
  const total = item.qty || 0;
  const rem = (item.remaining !== undefined) ? item.remaining : total;
  return total > 0 ? (rem / total) * 100 : 0;
}

function render() {
  const ct = document.getElementById('content');
  ct.innerHTML = '';
  const range = getRange();
  if (curSec==='inbound') renderInbound(ct, range);
  else if (curSec==='stock') renderStock(ct);
  else renderOutbound(ct, range);
}

function mkGrid(a,b,c){
  const g=document.createElement('div');g.className='sum-grid';
  [a,b,c].forEach(x=>{
    g.innerHTML += `<div class="sum-card"><div class="sum-num ${x.cls||''}">${x.v}</div><div class="sum-label">${x.l}</div></div>`;
  });
  return g;
}
function mkCard(title){
  const d=document.createElement('div'); d.className='card';
  d.innerHTML=`<div class="card-hdr">${title}</div>`; return d;
}
function mkBar(sec,label,val,pct,type){
  const b=document.createElement('div'); b.className='bar-wrap';
  if(expandedId === sec.id) b.style.background = 'var(--subtle)';
  b.innerHTML=`<div class="bar-label"><span>${label}</span><span>${val}</span></div><div class="bar-bg"><div class="bar-fill ${type}" style="width:${Math.min(pct,100)}%"></div></div>`;
  b.onclick=()=>{ expandedId=(expandedId===sec.id)?null:sec.id; render(); };
  return b;
}
function mkRow(name,val,cls){
  const r=document.createElement('div'); r.className='list-row';
  r.innerHTML=`<span class="list-name">${name}</span><span class="list-val ${cls||'ok'}">${val}</span>`; return r;
}

function renderInbound(ct, range) {
  const all = SECTIONS.flatMap(s=>(cache[s.id]||[]).filter(i=>i.createdAt>=range.s && i.createdAt<=range.e).map(i=>({...i,sec:s})));
  const total = all.reduce((a,i)=>a+(parseFloat(getInputVal(i, i.sec.id).qty)||0),0);
  ct.appendChild(mkGrid({v:all.length,l:'입고 건수'},{v:fmt(total),l:'총 입고량'},{v:new Set(all.map(i=>i.sec.id)).size,l:'카테고리'}));
  
  const card = mkCard('카테고리별 입고 (클릭 시 상세)');
  SECTIONS.forEach(s=>{
    const its = all.filter(i=>i.sec.id===s.id);
    if(!its.length) return;
    const sQty = its.reduce((a,i)=>a+(parseFloat(getInputVal(i, s.id).qty)||0),0);
    card.appendChild(mkBar(s, `${s.icon} ${s.label}`, `${its.length}건 · ${fmt(sQty)}`, (sQty/(total||1))*100, 'in'));
    if(expandedId===s.id){
      const list = document.createElement('div'); list.className='detail-list';
      its.sort((a,b)=>b.createdAt - a.createdAt).forEach(i=>{
        const data = getInputVal(i, s.id);
        list.appendChild(mkRow(i.name, `${fmt(data.qty)} ${data.unit}`));
      });
      card.appendChild(list);
    }
  });
  if(!all.length) card.innerHTML += '<div class="empty">입고 내역이 없습니다</div>';
  ct.appendChild(card);
}

function renderStock(ct) {
  const all = SECTIONS.flatMap(s=>(cache[s.id]||[]).map(i=>({...i,sec:s})));
  const warn = all.filter(i=> {const p=getPct(i, i.sec.id); return p>15 && p<=40;}).length;
  const urgent = all.filter(i=> getPct(i, i.sec.id)<=15).length;
  ct.appendChild(mkGrid({v:all.length,l:'전체 품목'},{v:warn,l:'주문 요망',cls:'warn'},{v:urgent,l:'긴급 주문',cls:'urgent'}));
  
  const card = mkCard('평균 재고율 (클릭 시 상세)');
  SECTIONS.forEach(s=>{
    const its = cache[s.id]||[];
    if(!its.length) return;
    const avg = its.reduce((a,i)=>a+getPct(i, s.id),0)/its.length;
    card.appendChild(mkBar(s, `${s.icon} ${s.label}`, `${its.length}개 · 평균 ${avg.toFixed(0)}%`, avg, 'stock'));
    if(expandedId===s.id){
      const list = document.createElement('div'); list.className='detail-list';
      its.sort((a,b)=>getPct(a, s.id)-getPct(b, s.id)).forEach(i=>{
        const p=getPct(i, s.id); 
        const data = getInputVal(i, s.id);
        list.appendChild(mkRow(i.name, `${fmt(data.qty)} ${data.unit} (${p.toFixed(0)}%)`, p<=15?'urgent':p<=40?'warn':'ok'));
      });
      card.appendChild(list);
    }
  });
  ct.appendChild(card);
}

function renderOutbound(ct, range) {
  const all = SECTIONS.flatMap(s=>(cache[s.id]||[]).filter(i=>i.createdAt>=range.s && i.createdAt<=range.e).map(i=>{
    const rem = (i.remaining !== undefined) ? i.remaining : i.qty;
    const outRaw = Math.max(0, i.qty - rem);
    // Calculate out qty in input unit
    const conv = conversions[s.id] && conversions[s.id][i.name];
    let outVal = outRaw;
    let unit = i.unit;
    if (conv && i.inboundQty) {
      outVal = outRaw / (conv.ratio || 1);
      unit = i.inboundUnit;
    }
    return {...i, outVal, outUnit: unit, sec:s};
  })).filter(i=>i.outVal>0);
  
  const total = all.reduce((a,i)=>a+i.outVal,0);
  ct.appendChild(mkGrid({v:all.length,l:'출고 품목'},{v:fmt(total),l:'총 출고량'},{v:new Set(all.map(i=>i.sec.id)).size,l:'카테고리'}));
  
  const card = mkCard('카테고리별 출고 (클릭 시 상세)');
  SECTIONS.forEach(s=>{
    const its = all.filter(i=>i.sec.id===s.id);
    if(!its.length) return;
    const sQty = its.reduce((a,i)=>a+i.outVal,0);
    card.appendChild(mkBar(s, `${s.icon} ${s.label}`, `${its.length}종 · 총 ${fmt(sQty)}`, (sQty/(total||1))*100, 'out'));
    if(expandedId===s.id){
      const list = document.createElement('div'); list.className='detail-list';
      its.sort((a,b)=>b.outVal - a.outVal).forEach(i=>list.appendChild(mkRow(i.name, `${fmt(i.outVal)} ${i.outUnit} 사용`, 'warn')));
      card.appendChild(list);
    }
  });
  if(!all.length) card.innerHTML += '<div class="empty">출고 내역이 없습니다</div>';
  ct.appendChild(card);
}
</script>
</body>
</html>
