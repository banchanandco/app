<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>통계 — Banchan and Co</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#9caf88"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Banchan"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--accent:#9caf88;--accent-dark:#7a9068;--accent-bg:#f0f5ec;--accent-light:#c8d9bc;--bg:#f5f4f0;--surface:#fff;--border:#dedad3;--subtle:#eceae5;--muted:#9a9488;--body:#4a4540;--heading:#2a2520;--brown:#5c3d2e;--brown-light:#8b6355}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--body);min-height:100vh;padding-bottom:40px}
    header{background:var(--accent);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:12px}
    .hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px}
    .back-btn{background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:4px;line-height:1}
    header h1{font-size:1.05rem;font-weight:700;color:#fff}
    .header-right{display:flex;align-items:center;gap:10px}
    .user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover}
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
    .drawer-overlay.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;left:-280px;top:0;bottom:0;width:280px;background:var(--surface);z-index:301;transition:left .25s;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.12)}
    .drawer.open{left:0}
    .drawer-header{background:var(--accent);padding:44px 20px 20px;display:flex;flex-direction:column;gap:6px}
    .drawer-avatar{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover;margin-bottom:4px}
    .drawer-name{font-size:1rem;font-weight:700;color:#fff}
    .drawer-email{font-size:0.73rem;color:rgba(255,255,255,0.65)}
    .drawer-menu{flex:1;padding:10px 0}
    .drawer-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:0.9rem;color:var(--body);cursor:pointer}
    .drawer-item:active{background:var(--accent-bg)}
    .drawer-item.active{color:var(--accent-dark);font-weight:600;background:var(--accent-bg)}
    .drawer-item .di-icon{font-size:1.2rem}
    .drawer-logout{margin:0 16px 20px;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--muted);cursor:pointer;width:calc(100% - 32px)}
    .content{padding:16px;display:flex;flex-direction:column;gap:14px}
    .week-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
    .week-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.8rem;color:var(--muted);cursor:pointer}
    .week-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .stats-mini{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:14px}
    .stat-num{font-family:'DM Mono',monospace;font-size:1.8rem;font-weight:500;color:var(--accent-dark)}
    .stat-sub{font-size:0.75rem;color:var(--muted);margin-top:2px}
    .stats-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden}
    .stats-card-header{padding:12px 16px;border-bottom:1px solid var(--subtle);font-size:0.82rem;font-weight:700;color:var(--heading)}
    .bar-wrap{padding:10px 16px;border-bottom:1px solid var(--subtle)}
    .bar-wrap:last-child{border-bottom:none}
    .bar-label{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--body);margin-bottom:6px}
    .bar-bg{background:var(--subtle);border-radius:6px;height:8px;overflow:hidden}
    .bar-fill{height:100%;background:var(--accent);border-radius:6px;transition:width .5s ease}
    .stats-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--subtle);gap:8px}
    .stats-row:last-child{border-bottom:none}
    .stats-row .name{flex:1;font-size:0.85rem;color:var(--body)}
    .stats-row .who{font-size:0.72rem;color:var(--brown-light)}
    .stats-row .when{font-size:0.72rem;color:var(--muted);font-family:'DM Mono',monospace}
    .stats-empty{padding:24px 16px;text-align:center;color:var(--muted);font-size:0.82rem}
  </style>
</head>
<body>
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <img class="drawer-avatar" id="drawer-avatar" src="" alt=""/>
      <div class="drawer-name" id="drawer-name"></div>
      <div class="drawer-email" id="drawer-email"></div>
    </div>
    <div class="drawer-menu">
      <div class="drawer-item" onclick="location.href='main.html'"><span class="di-icon">🏠</span> 홈</div>
      <div class="drawer-item" onclick="location.href='inventory.html'"><span class="di-icon">📋</span> 재고 관리</div>
      <div class="drawer-item active"><span class="di-icon">📊</span> 통계</div>
      <div class="drawer-item" onclick="location.href='schedule.html'"><span class="di-icon">📅</span> 스케줄</div>
      <div class="drawer-item" onclick="location.href='cost.html'"><span class="di-icon">🧮</span> 원가계산</div>
      <div class="drawer-item" onclick="location.href='recipe.html'"><span class="di-icon">📖</span> 레시피</div>
    </div>
    <button class="drawer-logout" id="logout-btn">로그아웃</button>
  </div>
  <header>
    <div class="header-left">
      <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
      <button class="back-btn" onclick="location.href='main.html'">‹</button>
      <h1>통계</h1>
    </div>
    <div class="header-right">
      <img class="user-avatar" id="header-avatar" src="" alt=""/>
    </div>
  </header>
  <div class="content" id="content">
    <div style="padding:40px 0;text-align:center;color:var(--muted)">로딩 중...</div>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const fbApp=initializeApp({apiKey:"AIzaSyArW3yhj81OJpOkCEYfyaelgcdo8o_IAPw",authDomain:"banchan-inventory-144bd.firebaseapp.com",projectId:"banchan-inventory-144bd",storageBucket:"banchan-inventory-144bd.firebasestorage.app",messagingSenderId:"1022526862273",appId:"1:1022526862273:web:12a025d9db24c7c6b83540"});
    const auth=getAuth(fbApp), db=getFirestore(fbApp);
    const SECTIONS=[{id:'food',label:'식품',icon:'🥩'},{id:'clean',label:'청소',icon:'🧹'},{id:'take',label:'테이크아웃',icon:'🛍'},{id:'misc',label:'소모품',icon:'🪣'},{id:'other',label:'기타',icon:'📦'}];
    const cache={};SECTIONS.forEach(s=>cache[s.id]=[]);
    let selectedWeek=0, loaded=0;
    onAuthStateChanged(auth,user=>{
      if(!user){location.href='index.html';return;}
      document.getElementById('header-avatar').src=user.photoURL||'';
      document.getElementById('drawer-avatar').src=user.photoURL||'';
      document.getElementById('drawer-name').textContent=user.displayName||'';
      document.getElementById('drawer-email').textContent=user.email||'';
      SECTIONS.forEach(sec=>{
        const q=query(collection(db,sec.id),orderBy('createdAt'));
        onSnapshot(q,snap=>{cache[sec.id]=snap.docs.map(d=>({id:d.id,...d.data()}));loaded++;if(loaded>=SECTIONS.length)renderStats();},()=>{});
      });
    });
    document.getElementById('hamburger-btn').addEventListener('click',()=>{document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');});
    document.getElementById('drawer-overlay').addEventListener('click',()=>{document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');});
    document.getElementById('logout-btn').addEventListener('click',async()=>{await signOut(auth);location.href='index.html';});
    function getWeekRange(w){const now=new Date(),day=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-day+1-w*7);mon.setHours(0,0,0,0);const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);return{start:mon,end:sun};}
    function fmtWeekLabel(w){if(w===0)return'이번 주';if(w===1)return'지난 주';const{start,end}=getWeekRange(w);return`${start.getMonth()+1}/${start.getDate()} – ${end.getMonth()+1}/${end.getDate()}`;}
    function fmtTime(ts){if(!ts)return'';const d=new Date(ts),now=new Date(),diff=now-d;if(diff<60000)return'방금';if(diff<3600000)return Math.floor(diff/60000)+'분 전';if(diff<86400000)return Math.floor(diff/3600000)+'시간 전';return`${d.getMonth()+1}/${d.getDate()}`;}
    function renderStats(){
      const{start,end}=getWeekRange(selectedWeek);
      const allItems=SECTIONS.flatMap(sec=>cache[sec.id].map(i=>({...i,sec:sec.id,secLabel:sec.label,secIcon:SECTIONS.find(s=>s.id===sec.id)?.icon||''})));
      const weekItems=allItems.filter(i=>i.createdAt>=start.getTime()&&i.createdAt<=end.getTime());
      const bySec={};SECTIONS.forEach(s=>bySec[s.id]=0);weekItems.forEach(i=>bySec[i.sec]++);
      const maxCount=Math.max(...Object.values(bySec),1);
      const byUser={};weekItems.forEach(i=>{const u=i.addedBy||'알 수 없음';byUser[u]=(byUser[u]||0)+1;});
      const content=document.getElementById('content');content.innerHTML='';
      // Tabs
      const tabWrap=document.createElement('div');tabWrap.className='week-tabs';
      for(let i=0;i<4;i++){const btn=document.createElement('button');btn.className='week-tab'+(i===selectedWeek?' active':'');btn.textContent=fmtWeekLabel(i);btn.onclick=()=>{selectedWeek=i;renderStats();};tabWrap.appendChild(btn);}
      content.appendChild(tabWrap);
      // Grid numbers
      const grid=document.createElement('div');grid.className='stats-grid';
      grid.innerHTML=`<div class="stats-mini"><div class="stat-num">${weekItems.length}</div><div class="stat-sub">총 추가 항목</div></div><div class="stats-mini"><div class="stat-num">${weekItems.filter(i=>i.done).length}</div><div class="stat-sub">완료된 항목</div></div>`;
      content.appendChild(grid);
      // By section bar
      const secCard=document.createElement('div');secCard.className='stats-card';
      secCard.innerHTML='<div class="stats-card-header">섹션별 추가 항목</div>';
      SECTIONS.forEach(sec=>{const cnt=bySec[sec.id],pct=Math.round((cnt/maxCount)*100);const bw=document.createElement('div');bw.className='bar-wrap';bw.innerHTML=`<div class="bar-label"><span>${sec.icon} ${sec.label}</span><span>${cnt}건</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>`;secCard.appendChild(bw);});
      content.appendChild(secCard);
      // By user bar
      const userCard=document.createElement('div');userCard.className='stats-card';
      userCard.innerHTML='<div class="stats-card-header">팀원별 추가 항목</div>';
      const sortedUsers=Object.entries(byUser).sort((a,b)=>b[1]-a[1]);
      if(!sortedUsers.length){userCard.innerHTML+='<div class="stats-empty">이 기간에 추가된 항목이 없어요</div>';}
      else{const maxU=sortedUsers[0][1];sortedUsers.forEach(([name,cnt])=>{const pct=Math.round((cnt/maxU)*100);const bw=document.createElement('div');bw.className='bar-wrap';bw.innerHTML=`<div class="bar-label"><span>${name}</span><span>${cnt}건</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>`;userCard.appendChild(bw);});}
      content.appendChild(userCard);
      // Recent items
      const recentCard=document.createElement('div');recentCard.className='stats-card';
      recentCard.innerHTML='<div class="stats-card-header">최근 추가 항목</div>';
      const sorted=[...weekItems].sort((a,b)=>b.createdAt-a.createdAt).slice(0,20);
      if(!sorted.length){recentCard.innerHTML+='<div class="stats-empty">이 기간에 추가된 항목이 없어요</div>';}
      else{sorted.forEach(item=>{const row=document.createElement('div');row.className='stats-row';row.innerHTML=`<span class="name">${item.name.replace(/&/g,'&amp;')}</span><span class="who">${item.addedBy||''}</span><span class="when">${fmtTime(item.createdAt)}</span>`;recentCard.appendChild(row);});}
      content.appendChild(recentCard);
    }
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/app/sw.js")
          .catch(e => console.log("SW error:", e));
      });
    }
  </script>
</body>
</html>
