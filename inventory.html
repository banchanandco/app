<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>재고 관리 — Banchan and Co</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#9caf88"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Banchan"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --accent:#9caf88;--accent-dark:#7a9068;--accent-bg:#f0f5ec;--accent-light:#c8d9bc;
      --bg:#f5f4f0;--surface:#fff;--border:#dedad3;--subtle:#eceae5;
      --muted:#9a9488;--body:#4a4540;--heading:#2a2520;--brown:#5c3d2e;
      --urgent:#e05555;--urgent-bg:#fdf0f0;--warn:#e09020;--warn-bg:#fdf6ec;
    }
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--body);min-height:100vh;padding-bottom:80px}

    /* HEADER */
    header{background:var(--accent);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px}
    .back-btn{background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;line-height:1}
    header h1{font-size:1.05rem;font-weight:700;color:#fff}
    .header-right{display:flex;align-items:center;gap:10px}
    .user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover}

    /* DRAWER */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
    .drawer-overlay.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;left:-280px;top:0;bottom:0;width:280px;background:var(--surface);z-index:301;transition:left .25s;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.12)}
    .drawer.open{left:0}
    .drawer-header{background:var(--accent);padding:44px 20px 20px;display:flex;flex-direction:column;gap:6px}
    .drawer-avatar{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover;margin-bottom:4px}
    .drawer-name{font-size:1rem;font-weight:700;color:#fff}
    .drawer-email{font-size:0.73rem;color:rgba(255,255,255,0.65)}
    .drawer-menu{flex:1;padding:10px 0}
    .drawer-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:0.9rem;color:var(--body);cursor:pointer}
    .drawer-item:active{background:var(--accent-bg)}
    .drawer-item.active{color:var(--accent-dark);font-weight:600;background:var(--accent-bg)}
    .drawer-item .di-icon{font-size:1.2rem}
    .drawer-logout{margin:0 16px 20px;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--muted);cursor:pointer;width:calc(100% - 32px)}

    /* TABS */
    .tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:100;overflow-x:auto}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab-btn{flex:1;min-width:70px;padding:12px 8px;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.78rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;position:relative}
    .tab-btn.active{color:var(--accent-dark);border-bottom-color:var(--accent)}
    .tab-badge{position:absolute;top:6px;right:6px;background:var(--urgent);color:#fff;border-radius:10px;font-size:0.6rem;font-family:'DM Mono',monospace;padding:1px 5px;min-width:16px;text-align:center}
    .tab-badge.warn{background:var(--warn)}

    /* TAB VIEWS */
    .tab-view{display:none;padding:14px;flex-direction:column;gap:12px}
    .tab-view.active{display:flex}

    /* SECTION CARD */
    .section-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden}
    .section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--subtle);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
    .section-header:active{background:var(--accent-bg)}
    .section-title-row{display:flex;align-items:center;gap:10px}
    .section-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.95rem;background:var(--accent-bg)}
    .section-name{font-size:0.9rem;font-weight:700;color:var(--heading)}
    .section-badge{font-family:'DM Mono',monospace;font-size:0.68rem;background:var(--accent-bg);color:var(--accent-dark);border-radius:20px;padding:2px 8px}
    .chevron{font-size:0.75rem;color:var(--muted);transition:transform .25s}
    .collapsed .chevron{transform:rotate(-90deg)}
    .item-list{overflow:hidden;transition:max-height .3s ease;max-height:3000px}
    .collapsed .item-list{max-height:0}
    .collapsed .add-row{display:none}

    /* INBOUND ITEM ROW */
    .item-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--subtle)}
    .item-row:last-child{border-bottom:none}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:0.88rem;font-weight:600;color:var(--heading)}
    .item-meta{font-size:0.7rem;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
    .item-qty{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--accent-dark);background:var(--accent-bg);border-radius:8px;padding:2px 8px;white-space:nowrap}
    .del-btn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--muted);font-size:0.85rem;cursor:pointer;flex-shrink:0}
    .del-btn:active{background:var(--subtle)}
    .empty-row{padding:20px 16px;text-align:center;color:var(--muted);font-size:0.82rem}

    /* ADD ROW */
    .add-row{padding:10px 14px;border-top:1px solid var(--subtle)}
    .add-row-line{display:flex;gap:6px;margin-bottom:6px;align-items:center}
    .add-row-line:last-child{margin-bottom:0}
    .add-input{flex:1;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 11px}
    .add-input:focus{border-color:var(--accent)}
    .add-num{width:72px;border:1px solid var(--border);outline:none;font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 8px}
    .add-num:focus{border-color:var(--accent)}
    .add-sel{border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 6px;cursor:pointer}
    .add-sel:focus{border-color:var(--accent)}
    .add-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .add-btn:active{background:var(--accent-dark)}

    /* OUTBOUND ITEM ROW */
    .out-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--subtle)}
    .out-row:last-child{border-bottom:none}
    .out-info{flex:1;min-width:0}
    .out-name{font-size:0.88rem;font-weight:600;color:var(--heading)}
    .out-cat{font-size:0.68rem;color:var(--muted);margin-top:1px}
    .out-qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .out-remaining{font-family:'DM Mono',monospace;font-size:0.82rem;font-weight:700;color:var(--accent-dark);min-width:60px;text-align:right}
    .out-remaining.warn{color:var(--warn)}
    .out-remaining.urgent{color:var(--urgent)}
    .out-minus{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--body);-webkit-tap-highlight-color:transparent}
    .out-minus:active{background:var(--subtle)}
    .out-input{width:56px;border:1px solid var(--border);outline:none;font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:6px 6px;text-align:center}
    .out-input:focus{border-color:var(--accent)}
    .out-update{height:30px;padding:0 10px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;white-space:nowrap}
    .out-update:active{background:var(--accent-dark)}
    .out-bar-wrap{width:100%;margin-top:4px}
    .out-bar-bg{background:var(--subtle);border-radius:4px;height:4px;overflow:hidden}
    .out-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .3s}
    .out-bar-fill.warn{background:var(--warn)}
    .out-bar-fill.urgent{background:var(--urgent)}

    /* ORDER/URGENT CARDS */
    .alert-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:2px}
    .alert-card.urgent-card{border-color:var(--urgent)}
    .alert-header{padding:10px 14px;border-bottom:1px solid var(--subtle);font-size:0.78rem;font-weight:700;color:var(--heading);display:flex;align-items:center;gap:8px}
    .alert-header.urgent{color:var(--urgent);background:var(--urgent-bg)}
    .alert-header.warn{color:var(--warn);background:var(--warn-bg)}
    .alert-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--subtle);font-size:0.85rem}
    .alert-row:last-child{border-bottom:none}
    .alert-name{color:var(--body);font-weight:500}
    .alert-cat{font-size:0.7rem;color:var(--muted)}
    .alert-pct{font-family:'DM Mono',monospace;font-size:0.78rem;font-weight:700}
    .alert-pct.urgent{color:var(--urgent)}
    .alert-pct.warn{color:var(--warn)}
    .empty-alert{padding:24px;text-align:center;color:var(--muted);font-size:0.82rem}

    /* EDIT MODAL */
    .edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s}
    .edit-overlay.open{opacity:1;pointer-events:all}
    .edit-sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-radius:22px 22px 0 0;z-index:401;padding:20px 16px 40px;transform:translateY(100%);transition:transform .3s ease}
    .edit-sheet.open{transform:translateY(0)}
    .edit-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .edit-title{font-size:0.95rem;font-weight:700;color:var(--heading);margin-bottom:14px}
    .edit-field{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .edit-label{font-size:0.78rem;color:var(--muted);width:52px;flex-shrink:0}
    .edit-input{flex:1;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.88rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 11px}
    .edit-input:focus{border-color:var(--accent)}
    .edit-sel{border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 8px;cursor:pointer}
    .edit-save{width:100%;padding:12px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:4px}
    .edit-save:active{background:var(--accent-dark)}

    /* STOCK ITEM ROW */
    .stock-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--subtle)}
    .stock-row:last-child{border-bottom:none}
    .stock-name{flex:1;font-size:0.88rem;color:var(--heading)}
    .stock-qty{font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--accent-dark);background:var(--accent-bg);border-radius:8px;padding:3px 9px;white-space:nowrap}
    .stock-edit{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .stock-edit:active{background:var(--subtle)}
    .stock-del{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--muted);font-size:0.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .stock-del:active{background:var(--subtle)}

    /* TOAST */
    #toast{position:fixed;bottom:20px;right:16px;background:var(--accent-dark);color:#fff;font-size:0.75rem;padding:7px 14px;border-radius:20px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;font-family:'DM Mono',monospace}
  </style>
</head>
<body>

<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <img class="drawer-avatar" id="drawer-avatar" src="" alt=""/>
    <div class="drawer-name" id="drawer-name"></div>
    <div class="drawer-email" id="drawer-email"></div>
  </div>
  <div class="drawer-menu">
    <div class="drawer-item" onclick="location.href='main.html'"><span class="di-icon">🏠</span> 홈</div>
    <div class="drawer-item active"><span class="di-icon">📋</span> 재고 관리</div>
    <div class="drawer-item" onclick="location.href='statistics.html'"><span class="di-icon">📊</span> 통계</div>
    <div class="drawer-item" onclick="location.href='schedule.html'"><span class="di-icon">📅</span> 스케줄</div>
    <div class="drawer-item" onclick="location.href='cost.html'"><span class="di-icon">🧮</span> 원가계산</div>
    <div class="drawer-item" onclick="location.href='recipe.html'"><span class="di-icon">📖</span> 레시피</div>
  </div>
  <button class="drawer-logout" id="logout-btn">로그아웃</button>
</div>

<header>
  <div class="header-left">
    <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
    <button class="back-btn" onclick="location.href='main.html'">‹</button>
    <h1>재고 관리</h1>
  </div>
  <div class="header-right">
    <img class="user-avatar" id="header-avatar" src="" alt=""/>
  </div>
</header>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="inbound">📥 입고</button>
  <button class="tab-btn" data-tab="stock">📦 재고</button>
  <button class="tab-btn" data-tab="outbound">📤 출고</button>
  <button class="tab-btn" data-tab="order">🛒 주문요망<span class="tab-badge warn" id="badge-order" style="display:none"></span></button>
  <button class="tab-btn" data-tab="urgent">🚨 Urgent<span class="tab-badge" id="badge-urgent" style="display:none"></span></button>
</div>

<!-- INBOUND TAB -->
<div class="tab-view active" id="tab-inbound"></div>

<!-- STOCK TAB -->
<div class="tab-view" id="tab-stock"></div>

<!-- OUTBOUND TAB -->
<div class="tab-view" id="tab-outbound"></div>

<!-- ORDER TAB -->
<div class="tab-view" id="tab-order"></div>

<!-- URGENT TAB -->
<div class="tab-view" id="tab-urgent"></div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbApp = initializeApp({
  apiKey:"AIzaSyArW3yhj81OJpOkCEYfyaelgcdo8o_IAPw",
  authDomain:"banchan-inventory-144bd.firebaseapp.com",
  projectId:"banchan-inventory-144bd",
  storageBucket:"banchan-inventory-144bd.firebasestorage.app",
  messagingSenderId:"1022526862273",
  appId:"1:1022526862273:web:12a025d9db24c7c6b83540"
});
const auth = getAuth(fbApp);
const db   = getFirestore(fbApp);

const SECTIONS = [
  { id:'food',      label:'식재료', icon:'🥩' },
  { id:'container', label:'컨테이너', icon:'📦' },
  { id:'misc',      label:'소모품',  icon:'🪣' },
  { id:'clean',     label:'청소',    icon:'🧹' },
  { id:'other',     label:'기타',    icon:'📂' },
];

let cache = {};
SECTIONS.forEach(s => cache[s.id] = []);
let currentUser = null;
let unsubscribers = [];

// ── Auth ──────────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (!user) { location.href='index.html'; return; }
  currentUser = user;
  document.getElementById('header-avatar').src = user.photoURL||'';
  document.getElementById('drawer-avatar').src  = user.photoURL||'';
  document.getElementById('drawer-name').textContent  = user.displayName||'';
  document.getElementById('drawer-email').textContent = user.email||'';
  initFirestore();
});

// ── Drawer ────────────────────────────────────────────
document.getElementById('hamburger-btn').addEventListener('click', () => {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
});
document.getElementById('drawer-overlay').addEventListener('click', () => {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
});
document.getElementById('logout-btn').addEventListener('click', async () => {
  unsubscribers.forEach(u=>u());
  await signOut(auth);
  location.href = 'index.html';
});

// ── Tabs ──────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

// ── Toast ─────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.opacity='1';
  clearTimeout(el._t); el._t = setTimeout(()=>el.style.opacity='0', 2000);
}

// ── Time format ───────────────────────────────────────
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── Firestore ─────────────────────────────────────────
function initFirestore() {
  SECTIONS.forEach(sec => {
    const q = query(collection(db, `inv_${sec.id}`), orderBy('createdAt','desc'));
    const unsub = onSnapshot(q, snap => {
      cache[sec.id] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    }, err => showToast('오류: '+err.code));
    unsubscribers.push(unsub);
  });
}

function renderAll() {
  renderInbound();
  renderStock();
  renderOutbound();
  renderOrderUrgent();
}

// ── INBOUND ───────────────────────────────────────────
function renderInbound() {
  const view = document.getElementById('tab-inbound');
  view.innerHTML = '';
  SECTIONS.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'section-card';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `
      <div class="section-title-row">
        <div class="section-icon">${sec.icon}</div>
        <span class="section-name">${sec.label}</span>
      </div>
      <span class="chevron">▾</span>
    `;
    hdr.addEventListener('click', () => card.classList.toggle('collapsed'));
    card.appendChild(hdr);

    const addRow = document.createElement('div');
    addRow.className = 'add-row';
    addRow.style.borderTop = 'none';
    addRow.innerHTML = `
      <div class="add-row-line">
        <input class="add-input" placeholder="품목명" maxlength="30"/>
      </div>
      <div class="add-row-line">
        <input class="add-num" type="number" placeholder="수량" min="0" step="any"/>
        <select class="add-sel">
          <option>개</option><option>box</option><option>bag</option>
          <option>lb</option><option>oz</option><option>Kg</option><option>g</option>
          <option>l</option><option>ml</option><option>bottle</option><option>can</option><option>pack</option>
        </select>
        <button class="add-btn">+</button>
      </div>
    `;
    addRow.querySelector('.add-btn').addEventListener('click', () => addItem(sec.id, addRow));
    addRow.querySelector('.add-input').addEventListener('keydown', e => { if(e.key==='Enter') addItem(sec.id, addRow); });
    card.appendChild(addRow);
    view.appendChild(card);
  });
}

async function addItem(secId, addRow) {
  const name  = addRow.querySelector('.add-input').value.trim();
  const qty   = parseFloat(addRow.querySelector('.add-num').value);
  const unit  = addRow.querySelector('.add-sel').value;
  if (!name || !qty) { showToast('품목명과 수량을 입력하세요'); return; }
  addRow.querySelector('.add-input').value = '';
  addRow.querySelector('.add-num').value = '';
  showToast('저장 중...');
  await addDoc(collection(db, `inv_${secId}`), {
    name, qty, unit, remaining: qty,
    createdAt: Date.now(),
    addedBy: currentUser?.displayName || currentUser?.email || '',
  });
  showToast('입고됨 ✓');
}

// ── STOCK ─────────────────────────────────────────────
let editingItem = null;
let editingSecId = null;

function renderStock() {
  const view = document.getElementById('tab-stock');
  view.innerHTML = '';
  let hasAny = false;
  SECTIONS.forEach(sec => {
    const items = [...cache[sec.id]].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    if (!items.length) return;
    hasAny = true;
    const card = document.createElement('div');
    card.className = 'section-card';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `
      <div class="section-title-row">
        <div class="section-icon">${sec.icon}</div>
        <span class="section-name">${sec.label}</span>
        <span class="section-badge">${items.length}</span>
      </div>
      <span class="chevron">▾</span>
    `;
    hdr.addEventListener('click', () => card.classList.toggle('collapsed'));
    card.appendChild(hdr);

    const list = document.createElement('div');
    list.className = 'item-list';
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'stock-row';
      row.innerHTML = `
        <span class="stock-name">${item.name}</span>
        <span class="stock-qty">${item.remaining ?? item.qty} ${item.unit}</span>
        <button class="stock-edit" title="수정">✏️</button>
        <button class="stock-del" title="삭제">✕</button>
      `;
      row.querySelector('.stock-edit').addEventListener('click', () => openEdit(sec.id, item));
      row.querySelector('.stock-del').addEventListener('click', async () => {
        row.style.opacity='0'; row.style.transition='opacity .2s';
        setTimeout(() => deleteDoc(doc(db,`inv_${sec.id}`,item.id)), 200);
      });
      list.appendChild(row);
    });
    card.appendChild(list);
    view.appendChild(card);
  });
  if (!hasAny) {
    view.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted);font-size:0.85rem">입고된 항목이 없어요</div>';
  }
}

function openEdit(secId, item) {
  editingSecId = secId;
  editingItem  = item;
  document.getElementById('edit-name').value = item.name;
  document.getElementById('edit-qty').value  = item.remaining ?? item.qty;
  document.getElementById('edit-unit').value = item.unit;
  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('edit-sheet').classList.add('open');
}
function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('open');
  document.getElementById('edit-sheet').classList.remove('open');
  editingItem = null; editingSecId = null;
}
document.getElementById('edit-overlay').addEventListener('click', closeEdit);
document.getElementById('edit-save').addEventListener('click', async () => {
  if (!editingItem || !editingSecId) return;
  const name = document.getElementById('edit-name').value.trim();
  const qty  = parseFloat(document.getElementById('edit-qty').value);
  const unit = document.getElementById('edit-unit').value;
  if (!name || isNaN(qty)) { showToast('입력값을 확인하세요'); return; }
  await updateDoc(doc(db, `inv_${editingSecId}`, editingItem.id), {
    name, remaining: qty, unit
  });
  showToast('수정됨 ✓');
  closeEdit();
});

// ── OUTBOUND ──────────────────────────────────────────
function renderOutbound() {
  const view = document.getElementById('tab-outbound');
  view.innerHTML = '';
  SECTIONS.forEach(sec => {
    const items = [...cache[sec.id]].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    if (!items.length) return;
    const card = document.createElement('div');
    card.className = 'section-card';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `
      <div class="section-title-row">
        <div class="section-icon">${sec.icon}</div>
        <span class="section-name">${sec.label}</span>
        <span class="section-badge">${items.length}</span>
      </div>
      <span class="chevron">▾</span>
    `;
    hdr.addEventListener('click', () => card.classList.toggle('collapsed'));
    card.appendChild(hdr);

    const list = document.createElement('div');
    list.className = 'item-list';
    items.forEach(item => {
      const remaining = item.remaining ?? item.qty;
      const pct = item.qty > 0 ? (remaining / item.qty) * 100 : 0;
      const statusClass = pct <= 15 ? 'urgent' : pct <= 40 ? 'warn' : '';
      const row = document.createElement('div');
      row.className = 'out-row';
      row.innerHTML = `
        <div class="out-info">
          <div class="out-name">${item.name}</div>
          <div class="out-cat">${item.qty} ${item.unit} 입고</div>
          <div class="out-bar-wrap">
            <div class="out-bar-bg">
              <div class="out-bar-fill ${statusClass}" style="width:${Math.min(pct,100).toFixed(1)}%"></div>
            </div>
          </div>
        </div>
        <div class="out-qty-wrap">
          <span class="out-remaining ${statusClass}">${remaining} ${item.unit}</span>
          <button class="out-minus">−</button>
          <input class="out-input" type="number" value="1" min="0" step="any"/>
          <button class="out-update">출고</button>
        </div>
      `;
      // Quick minus
      row.querySelector('.out-minus').addEventListener('click', async () => {
        const newVal = Math.max(0, (item.remaining ?? item.qty) - 1);
        await updateDoc(doc(db, `inv_${sec.id}`, item.id), { remaining: newVal });
        showToast(`-1 ${item.unit}`);
      });
      // Update button
      row.querySelector('.out-update').addEventListener('click', async () => {
        const inp = row.querySelector('.out-input');
        const amt = parseFloat(inp.value);
        if (isNaN(amt) || amt < 0) return;
        const newVal = Math.max(0, (item.remaining ?? item.qty) - amt);
        await updateDoc(doc(db, `inv_${sec.id}`, item.id), { remaining: newVal });
        inp.value = '1';
        showToast(`출고 -${amt} ${item.unit} ✓`);
      });
      list.appendChild(row);
    });
    card.appendChild(list);
    view.appendChild(card);
  });
  if (!view.children.length) {
    view.innerHTML = '<div style="padding:32px;text-align:center;color:var(--muted);font-size:0.85rem">입고된 항목이 없어요</div>';
  }
}

// ── ORDER / URGENT ────────────────────────────────────
function renderOrderUrgent() {
  const orderView  = document.getElementById('tab-order');
  const urgentView = document.getElementById('tab-urgent');
  orderView.innerHTML = '';
  urgentView.innerHTML = '';

  const orderItems  = []; // 15% ~ 40%
  const urgentItems = []; // < 15%

  SECTIONS.forEach(sec => {
    cache[sec.id].forEach(item => {
      const remaining = item.remaining ?? item.qty;
      const pct = item.qty > 0 ? (remaining / item.qty) * 100 : 0;
      if (pct <= 15) urgentItems.push({ ...item, secLabel: sec.label, secIcon: sec.icon, pct });
      else if (pct <= 40) orderItems.push({ ...item, secLabel: sec.label, secIcon: sec.icon, pct });
    });
  });

  // Badges
  const ob = document.getElementById('badge-order');
  const ub = document.getElementById('badge-urgent');
  ob.style.display = orderItems.length ? 'inline-block' : 'none';
  ob.textContent = orderItems.length;
  ub.style.display = urgentItems.length ? 'inline-block' : 'none';
  ub.textContent = urgentItems.length;

  // Render order
  if (!orderItems.length) {
    orderView.innerHTML = '<div class="alert-card"><div class="empty-alert">🎉 주문 필요 항목이 없어요</div></div>';
  } else {
    const grouped = groupBySection(orderItems);
    grouped.forEach(({ sec, items }) => {
      const card = document.createElement('div');
      card.className = 'alert-card';
      card.innerHTML = `<div class="alert-header warn">${sec.icon} ${sec.label} (${items.length})</div>`;
      items.sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(item => {
        const row = document.createElement('div');
        row.className = 'alert-row';
        row.innerHTML = `
          <div>
            <div class="alert-name">${item.name}</div>
            <div class="alert-cat">잔여 ${(item.remaining??item.qty)} ${item.unit}</div>
          </div>
          <span class="alert-pct warn">${item.pct.toFixed(0)}%</span>
        `;
        card.appendChild(row);
      });
      orderView.appendChild(card);
    });
  }

  // Render urgent
  if (!urgentItems.length) {
    urgentView.innerHTML = '<div class="alert-card"><div class="empty-alert">✅ 긴급 주문 항목이 없어요</div></div>';
  } else {
    const grouped = groupBySection(urgentItems);
    grouped.forEach(({ sec, items }) => {
      const card = document.createElement('div');
      card.className = 'alert-card urgent-card';
      card.innerHTML = `<div class="alert-header urgent">🚨 ${sec.icon} ${sec.label} (${items.length})</div>`;
      items.sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(item => {
        const row = document.createElement('div');
        row.className = 'alert-row';
        row.innerHTML = `
          <div>
            <div class="alert-name">${item.name}</div>
            <div class="alert-cat">잔여 ${(item.remaining??item.qty)} ${item.unit}</div>
          </div>
          <span class="alert-pct urgent">${item.pct.toFixed(0)}%</span>
        `;
        card.appendChild(row);
      });
      urgentView.appendChild(card);
    });
  }
}

function groupBySection(items) {
  const map = {};
  SECTIONS.forEach(s => map[s.id] = { sec: s, items: [] });
  items.forEach(item => {
    const sec = SECTIONS.find(s => cache[s.id].some(i=>i.id===item.id));
    if (sec) map[sec.id].items.push(item);
  });
  return SECTIONS.map(s=>map[s.id]).filter(g=>g.items.length>0);
}
</script>
