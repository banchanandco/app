<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>재고 관리 — Banchan and Co</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#9caf88"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Banchan"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    /* ── DARK MODE ─────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      body[data-theme="auto"], body[data-theme="dark"] {
        --bg:#1a1916;
        --surface:#252320;
        --border:#3d3933;
        --subtle:#2d2a26;
        --muted:#8a857d;
        --body:#e0dcd4;
        --heading:#f5f1ea;
        --accent:#9caf88;
        --accent-dark:#b8c8a4;
        --accent-bg:#2a3328;
        --accent-light:#3d4a39;
        --urgent-bg:#3a1e1e;
        --warn-bg:#3a2a1a;
      }
    }
    body[data-theme="dark"] {
      --bg:#1a1916;
      --surface:#252320;
      --border:#3d3933;
      --subtle:#2d2a26;
      --muted:#8a857d;
      --body:#e0dcd4;
      --heading:#f5f1ea;
      --accent:#9caf88;
      --accent-dark:#b8c8a4;
      --accent-bg:#2a3328;
      --accent-light:#3d4a39;
      --urgent-bg:#3a1e1e;
      --warn-bg:#3a2a1a;
    }
    :root{
      --accent:#9caf88;--accent-dark:#7a9068;--accent-bg:#f0f5ec;--accent-light:#c8d9bc;
      --bg:#f5f4f0;--surface:#fff;--border:#dedad3;--subtle:#eceae5;
      --muted:#9a9488;--body:#4a4540;--heading:#2a2520;
      --urgent:#e05555;--urgent-bg:#fdf0f0;--warn:#e09020;--warn-bg:#fdf6ec;
    }
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--body);min-height:100vh;padding-bottom:80px}
    header{background:var(--accent);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between}
    .header-left{display:flex;align-items:center;gap:10px}
    .hamburger{background:none;border:none;cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px}
    .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px}
    .back-btn{background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;line-height:1}
    header h1{font-size:1.05rem;font-weight:700;color:#fff}
    .header-right{display:flex;align-items:center;gap:10px}
    .user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover}
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s}
    .drawer-overlay.open{opacity:1;pointer-events:all}
    .drawer{position:fixed;left:-280px;top:0;bottom:0;width:280px;background:var(--surface);z-index:301;transition:left .25s;display:flex;flex-direction:column;box-shadow:4px 0 20px rgba(0,0,0,0.12)}
    .drawer.open{left:0}
    .drawer-header{background:var(--accent);padding:44px 20px 20px;display:flex;flex-direction:column;gap:6px}
    .drawer-avatar{width:46px;height:46px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);object-fit:cover;margin-bottom:4px}
    .drawer-name{font-size:1rem;font-weight:700;color:#fff}
    .drawer-email{font-size:0.73rem;color:rgba(255,255,255,0.65)}
    .drawer-menu{flex:1;padding:10px 0}
    .drawer-item{display:flex;align-items:center;gap:14px;padding:14px 20px;font-size:0.9rem;color:var(--body);cursor:pointer}
    .drawer-item:active{background:var(--accent-bg)}
    .drawer-item.active{color:var(--accent-dark);font-weight:600;background:var(--accent-bg)}
    .drawer-item .di-icon{font-size:1.2rem}
    .drawer-logout{margin:0 16px 20px;padding:12px;border:1.5px solid var(--border);border-radius:10px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--muted);cursor:pointer;width:calc(100% - 32px)}

    /* TABS */
    .tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:100;overflow-x:auto}
    .tab-bar::-webkit-scrollbar{display:none}
    .tab-btn{flex:1;min-width:68px;padding:12px 6px;border:none;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:0.76rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;position:relative}
    .tab-btn.active{color:var(--accent-dark);border-bottom-color:var(--accent)}
    .tab-badge{position:absolute;top:5px;right:4px;background:var(--urgent);color:#fff;border-radius:10px;font-size:0.58rem;padding:1px 4px;min-width:14px;text-align:center}
    .tab-badge.warn{background:var(--warn)}
    .tab-view{display:none;padding:14px;flex-direction:column;gap:12px}
    .tab-view.active{display:flex}

    /* SECTION CARD */
    .section-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden}
    .section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
    .section-header:active{background:var(--accent-bg)}
    .section-header.open{border-bottom:1px solid var(--subtle)}
    .section-title-row{display:flex;align-items:center;gap:10px}
    .section-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;background:var(--accent-bg)}
    .section-name{font-size:0.92rem;font-weight:700;color:var(--heading)}
    .section-badge{font-family:'DM Mono',monospace;font-size:0.68rem;background:var(--accent-bg);color:var(--accent-dark);border-radius:20px;padding:2px 8px}
    .chevron{font-size:0.75rem;color:var(--muted);transition:transform .25s}
    .chevron.open{transform:rotate(180deg)}

    /* ITEM PICKER */
    .item-picker{display:none;padding:10px 12px;flex-direction:column;gap:8px}
    .item-picker.open{display:flex}
    .picker-search{width:100%;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 12px}
    .picker-search:focus{border-color:var(--accent)}
    .picker-items{display:flex;flex-wrap:wrap;gap:6px}
    .picker-item{padding:7px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;color:var(--body);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none}
    .picker-item.selected{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
    .picker-item.manage-btn{color:var(--muted);font-size:0.78rem}

    /* SELECTED INPUTS */
    .selected-inputs{display:none;flex-direction:column;gap:0;border-top:1px solid var(--subtle)}
    .sel-item-block{padding:12px 14px;border-bottom:1px solid var(--subtle)}
    .sel-item-block:last-of-type{border-bottom:none}
    .sel-item-name{font-size:0.88rem;font-weight:700;color:var(--heading);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
    .sel-conv-badge{font-size:0.7rem;color:var(--accent-dark);background:var(--accent-bg);border-radius:6px;padding:2px 7px;font-family:'DM Mono',monospace}
    .sel-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
    .sel-label{font-size:0.72rem;color:var(--muted);width:44px;flex-shrink:0}
    .sel-num{width:72px;border:1px solid var(--border);outline:none;font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:8px 8px;text-align:center}
    .sel-num:focus{border-color:var(--accent)}
    .sel-sel{border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.8rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:8px 6px;cursor:pointer}
    .conv-hint{font-size:0.72rem;color:var(--muted);padding:0 2px}
    .conv-setup{background:var(--accent-bg);border-radius:8px;padding:8px 10px;font-size:0.75rem;color:var(--accent-dark);margin-top:4px}
    .submit-btn{width:calc(100% - 28px);margin:10px 14px;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer}
    .submit-btn:active{background:var(--accent-dark)}

    /* STOCK rows */
    .item-list-wrap{display:block}
    .item-list-wrap.hidden{display:none}
    .item-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--subtle)}
    .item-row:last-child{border-bottom:none}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:0.88rem;font-weight:600;color:var(--heading)}
    .item-meta{font-size:0.7rem;color:var(--muted);margin-top:2px}
    .item-qty{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--accent-dark);background:var(--accent-bg);border-radius:8px;padding:3px 9px;white-space:nowrap;text-align:right}
    .item-qty-sub{font-size:0.65rem;color:var(--muted);text-align:right;font-family:'DM Mono',monospace}
    .stock-edit{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .del-btn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--muted);font-size:0.85rem;cursor:pointer;flex-shrink:0}

    /* OUT rows */
    .out-row{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--subtle)}
    .out-row:last-child{border-bottom:none}
    .out-info{flex:1;min-width:0}
    .out-name{font-size:0.86rem;font-weight:600;color:var(--heading)}
    .out-sub{font-size:0.68rem;color:var(--muted);margin-top:1px}
    .out-bar-bg{height:4px;background:var(--subtle);border-radius:3px;margin-top:4px;overflow:hidden}
    .out-bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .3s}
    .out-bar-fill.warn{background:var(--warn)}
    .out-bar-fill.urgent{background:var(--urgent)}
    .out-remaining{font-family:'DM Mono',monospace;font-size:0.78rem;font-weight:700;color:var(--accent-dark);white-space:nowrap;text-align:right}
    .out-remaining.warn{color:var(--warn)}
    .out-remaining.urgent{color:var(--urgent)}
    .out-minus{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .out-input{width:50px;border:1px solid var(--border);outline:none;font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:6px 4px;text-align:center}
    .out-update{height:28px;padding:0 8px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.72rem;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}

    /* ALERT */
    .alert-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden}
    .alert-card.urgent-card{border-color:var(--urgent)}
    .alert-header{padding:10px 14px;border-bottom:1px solid var(--subtle);font-size:0.78rem;font-weight:700;display:flex;align-items:center;gap:8px}
    .alert-header.urgent{color:var(--urgent);background:var(--urgent-bg)}
    .alert-header.warn{color:var(--warn);background:var(--warn-bg)}
    .alert-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--subtle);font-size:0.85rem}
    .alert-row:last-child{border-bottom:none}
    .alert-name{color:var(--body);font-weight:500}
    .alert-sub{font-size:0.7rem;color:var(--muted)}
    .alert-pct{font-family:'DM Mono',monospace;font-size:0.78rem;font-weight:700}
    .alert-pct.urgent{color:var(--urgent)}
    .alert-pct.warn{color:var(--warn)}
    .empty-alert{padding:24px;text-align:center;color:var(--muted);font-size:0.82rem}

    /* SHEETS */
    .sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s}
    .sheet-overlay.open{opacity:1;pointer-events:all}
    .sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:580px;background:var(--surface);border-radius:22px 22px 0 0;z-index:401;padding:20px 16px 40px;transform:translateY(100%);transition:transform .3s ease;max-height:88vh;overflow-y:auto}
    .sheet.open{transform:translateX(-50%) translateY(0)}
    .sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .sheet-title{font-size:0.95rem;font-weight:700;color:var(--heading);margin-bottom:14px}
    .sheet-field{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .sheet-label{font-size:0.78rem;color:var(--muted);width:60px;flex-shrink:0}
    .sheet-input{flex:1;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.88rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 11px}
    .sheet-input:focus{border-color:var(--accent)}
    .sheet-sel{border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 8px;cursor:pointer}
    .sheet-save{width:100%;padding:12px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;margin-top:6px}
    .sheet-save:active{background:var(--accent-dark)}
    .sheet-hint{font-size:0.75rem;color:var(--muted);background:var(--subtle);border-radius:8px;padding:8px 10px;margin-bottom:10px;line-height:1.5}
    .manage-list{display:flex;flex-direction:column;gap:0;margin-bottom:12px;max-height:280px;overflow-y:auto}
    .manage-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--subtle)}
    .manage-row:last-child{border-bottom:none}
    .manage-name{flex:1;font-size:0.88rem;color:var(--body)}
    .manage-del{background:none;border:none;color:var(--muted);font-size:0.85rem;cursor:pointer;padding:4px 6px}
    .manage-add-row{display:flex;gap:8px}
    .manage-input{flex:1;border:1px solid var(--border);outline:none;font-family:'Noto Sans KR',sans-serif;font-size:0.88rem;color:var(--body);background:var(--subtle);border-radius:8px;padding:9px 11px}
    .manage-input:focus{border-color:var(--accent)}
    .manage-add-btn{padding:9px 14px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:0.85rem;cursor:pointer;white-space:nowrap}

    #toast{position:fixed;bottom:20px;right:16px;background:var(--accent-dark);color:#fff;font-size:0.75rem;padding:7px 14px;border-radius:20px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none;font-family:'DM Mono',monospace}


    /* ── RESPONSIVE MAX WIDTH ─────────────────────────── */
    @media (min-width: 620px) {
      body {
        max-width: 580px;
        margin: 0 auto;
        box-shadow: 0 0 60px rgba(0,0,0,0.18);
        min-height: 100vh;
      }
      html { background: #dedad3; }
      header { left: auto; right: auto; width: 100%; }
      .tab-bar { width: 100%; }
      .drawer { position: fixed; }
      .drawer-overlay { position: fixed; }
    }

    .theme-toggle-row{margin:0 16px 12px;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
    .theme-toggle-row:active{opacity:0.7}
    .theme-toggle-label{font-size:0.85rem;color:var(--body);font-weight:500;display:flex;align-items:center;gap:8px}
    .theme-toggle-val{font-size:0.78rem;color:var(--muted)}

    /* FAVORITES & QUICK OUT */
    .star-btn{background:none;border:none;font-size:1.05rem;cursor:pointer;padding:0;color:#cbc8c0;transition:transform .15s;flex-shrink:0;line-height:1}
    .star-btn.active{color:#f4c430}
    .star-btn:active{transform:scale(0.85)}
    .quick-out-row{display:flex;gap:5px;margin-top:5px}
    .quick-out-btn{padding:3px 9px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--accent-dark);cursor:pointer;font-weight:600}
    .quick-out-btn:active{background:var(--accent-bg)}
    .fav-section{order:-1}
    .item-row .star-btn{margin-right:2px}
  </style>
</head>
<body>
<script>
(function(){
  const saved = localStorage.getItem('app_theme') || 'auto';
  document.body.setAttribute('data-theme', saved);
})();
</script>

<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <img class="drawer-avatar" id="drawer-avatar" src="" alt=""/>
    <div class="drawer-name" id="drawer-name"></div>
    <div class="drawer-email" id="drawer-email"></div>
  </div>
    <div class="drawer-menu">
    <div class="drawer-item" onclick="location.href='main.html'"><span class="di-icon">🏠</span> 홈</div>
    <div class="drawer-item active"><span class="di-icon">📋</span> 재고 관리</div>
    <div class="drawer-item" onclick="location.href='orders.html'"><span class="di-icon">🛒</span> 주문 관리</div>
    <div class="drawer-item" onclick="location.href='shopping.html'"><span class="di-icon">🛍</span> 쇼핑 리스트</div>
    <div class="drawer-item" onclick="location.href='statistics.html'"><span class="di-icon">📊</span> 통계</div>
    <div class="drawer-item" onclick="location.href='schedule.html'"><span class="di-icon">📅</span> 스케줄</div>
    <div class="drawer-item" onclick="location.href='cost.html'"><span class="di-icon">🧮</span> 원가계산</div>
    <div class="drawer-item" onclick="location.href='recipe.html'"><span class="di-icon">📖</span> 레시피</div>
  </div>
  <div class="theme-toggle-row" id="theme-toggle-row">
    <span class="theme-toggle-label" id="theme-icon-label">🌙 다크 모드</span>
    <span class="theme-toggle-val" id="theme-val">자동</span>
  </div>
  <button class="drawer-logout" id="logout-btn">로그아웃</button>
</div>

<header>
  <div class="header-left">
    <button class="hamburger" id="hamburger-btn"><span></span><span></span><span></span></button>
    <button class="back-btn" onclick="location.href='main.html'">‹</button>
    <h1>재고 관리</h1>
  </div>
  <div class="header-right">
    <img class="user-avatar" id="header-avatar" src="" alt=""/>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="inbound">📥 입고</button>
  <button class="tab-btn" data-tab="stock">📦 재고</button>
  <button class="tab-btn" data-tab="outbound">📤 출고</button>
  <button class="tab-btn" data-tab="order">🛒 주문요망<span class="tab-badge warn" id="badge-order" style="display:none"></span></button>
  <button class="tab-btn" data-tab="urgent">🚨 Urgent<span class="tab-badge" id="badge-urgent" style="display:none"></span></button>
</div>

<div class="tab-view active" id="tab-inbound"></div>
<div class="tab-view" id="tab-stock"></div>
<div class="tab-view" id="tab-outbound"></div>
<div class="tab-view" id="tab-order"></div>
<div class="tab-view" id="tab-urgent"></div>

<!-- EDIT STOCK SHEET -->
<div class="sheet-overlay" id="edit-overlay"></div>
<div class="sheet" id="edit-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">재고 수정</div>
  <div class="sheet-field"><span class="sheet-label">품목명</span><input class="sheet-input" id="edit-name"/></div>
  <div class="sheet-field"><span class="sheet-label">잔여수량</span><input class="sheet-input" id="edit-qty" type="number" min="0" step="any" style="width:80px;flex:none"/><select class="sheet-sel" id="edit-unit"><option>개</option><option>box</option><option>case</option><option>bag</option><option>pack</option><option>lb</option><option>oz</option><option>Kg</option><option>g</option><option>l</option><option>ml</option><option>bottle</option><option>can</option></select></div>
  <button class="sheet-save" id="edit-save">저장하기</button>
</div>

<!-- CONVERSION SETUP SHEET -->
<div class="sheet-overlay" id="conv-overlay"></div>

// ── Favorites (localStorage 기반) ──────────────────────
const FAV_KEY='hanmaru_favorites_v1';
function loadFavs(){
  try{return JSON.parse(localStorage.getItem(FAV_KEY))||{};}
  catch(e){return {};}
}
function saveFavs(f){
  try{localStorage.setItem(FAV_KEY,JSON.stringify(f));}catch(e){}
}
function isFav(secId,name){
  const f=loadFavs();
  return !!(f[secId]&&f[secId][name]);
}

  const f=loadFavs();
  if(!f[secId])f[secId]={};
  if(f[secId][name])delete f[secId][name];
  else f[secId][name]=true;
  saveFavs(f);
}

// ── 원가계산 연동 ──────────────────────────────────────
// 입고 가격 정보를 cost.html이 이해하는 단위로 변환해서 cost_ingredients에 저장/업데이트
// rawQty: 입력한 수량 (입고 단위 기준, 예: 1)
// rawPrice: 입력한 가격
// priceUnit: 가격 입력 단위 ('box', '개' 등)
// conv: 변환 정보 객체 또는 null
// cost.html이 인식하는 단위
const COST_UNITS=['cup','tbsp','tsp','Kg','g','l','ml','lb','oz','개'];
// cost.html이 모르는 단위 → 인식 가능 단위로 변환하는 표 (배수)
// 예: gal은 cost.html에 없으니 ml로 풀어줌
const COST_UNIT_NORMALIZE={
  gal: {to:'ml', factor:3785.41},
  Gal: {to:'ml', factor:3785.41},
};
// 임의 단위/수량을 cost.html이 인식하는 (amount, unit) 쌍으로 정규화
function normalizeForCost(amount, unit){
  if(COST_UNITS.includes(unit)) return {amount, unit};
  const norm=COST_UNIT_NORMALIZE[unit];
  if(norm) return {amount: amount*norm.factor, unit: norm.to};
  return null; // 인식 불가
}
async function syncToCost(name, rawQty, rawPrice, priceUnit, conv){
  if(!rawPrice||rawPrice<=0||!rawQty||rawQty<=0)return;
  let amount, unit, price;
  // priceUnit이 변환의 inUnit (예: box)인 경우 → 1 box 분량을 cost 단위로 풀어줌
  if(conv && conv.inUnit && priceUnit===conv.inUnit){
    // 우선순위: each 정보가 있으면 부피/무게로 풀기 (gal 같은 단위는 ml로 정규화)
    if(conv.eachVol && conv.eachUnit){
      const norm=normalizeForCost(conv.ratio*conv.eachVol, conv.eachUnit);
      if(norm){ amount=norm.amount; unit=norm.unit; }
    }
    // each 없거나 정규화 실패 → outUnit 시도
    if(!unit){
      const norm=normalizeForCost(conv.ratio, conv.outUnit||'개');
      if(norm){ amount=norm.amount; unit=norm.unit; }
      else { amount=conv.ratio; unit='개'; } // 최종 폴백
    }
    price = parseFloat(rawPrice); // 1 box 가격
  } else {
    // priceUnit이 '개' 또는 변환 없음 → 1단위 = 입력 단위
    const norm=normalizeForCost(1, priceUnit);
    if(norm){ amount=norm.amount; unit=norm.unit; }
    else { amount=1; unit='개'; }
    price = parseFloat(rawPrice);
  }
  if(!amount||!unit||!price)return;
  // 같은 이름 기존 항목 있으면 업데이트, 없으면 추가
  try {
    const snap = await getDocs(query(collection(db,'cost_ingredients'),where('name','==',name)));
    if(!snap.empty){
      const existingDoc = snap.docs[0];
      await updateDoc(doc(db,'cost_ingredients',existingDoc.id),{name,price,amount,unit,density:existingDoc.data().density||1});
      console.log('[원가] 업데이트', name, {price,amount,unit});
    } else {
      await addDoc(collection(db,'cost_ingredients'),{name,price,amount,unit,density:1,createdAt:Date.now()});
      console.log('[원가] 추가', name, {price,amount,unit});
    }
  } catch(e){
    console.error('[원가] 동기화 실패', name, e);
  }
}

// ── Firestore init ────────────────────────────────────
async function initFirestore(){
  for(const sec of SECTIONS){
    // item lists
    const listRef=doc(db,'item_lists',sec.id);
    const listSnap=await getDoc(listRef);
    if(listSnap.exists()) itemLists[sec.id]=listSnap.data().items||[];
    else{itemLists[sec.id]=[...(DEFAULT_ITEMS[sec.id]||[])];await setDoc(listRef,{items:itemLists[sec.id]});}

    // conversions
    const convRef=doc(db,'item_conversions',sec.id);
    const convSnap=await getDoc(convRef);
    if(convSnap.exists()) conversions[sec.id]=convSnap.data()||{};

    // inventory listener
    // NOTE: orderBy('createdAt')를 사용하면 createdAt 필드가 없는 문서가 결과에서 누락됨
    // (예전 데이터, 수동 추가 등) → 재고 탭에 안 보이는 버그 원인. 클라이언트에서 정렬함.
    const q=collection(db,`inv_${sec.id}`);
    const unsub=onSnapshot(q,snap=>{
      cache[sec.id]=snap.docs.map(d=>({id:d.id,...d.data()}));
      console.log('[snapshot]', sec.id, '문서수:', cache[sec.id].length, cache[sec.id]);
      renderAll();
    },err=>{
      console.error('[snapshot 오류]', sec.id, err);
      showToast('읽기 오류: '+err.code);
    });
    unsubscribers.push(unsub);
  }
  renderInbound();
}

// ── INBOUND ───────────────────────────────────────────
function renderInbound(){
  const view=document.getElementById('tab-inbound');
  view.innerHTML='';
  SECTIONS.forEach(sec=>{
    const card=document.createElement('div');
    card.className='section-card';

    const hdr=document.createElement('div');

    hdr.innerHTML=`<div class="section-title-row"><div class="section-icon">${sec.icon}</div><span class="section-name">${sec.label}</span></div><span class="chevron">▾</span>`;

    const picker=document.createElement('div');
    picker.className='item-picker';

    const searchEl=document.createElement('input');
    searchEl.className='picker-search';searchEl.placeholder='품목 검색...';
    picker.appendChild(searchEl);

    const itemsWrap=document.createElement('div');
    itemsWrap.className='picker-items';
    picker.appendChild(itemsWrap);

    const selInputs=document.createElement('div');
    selInputs.className='selected-inputs';

    const submitBtn=document.createElement('button');
    submitBtn.className='submit-btn';
    submitBtn.textContent='입고 저장';
    submitBtn.style.display='none';

    function getConv(name){return conversions[sec.id]&&conversions[sec.id][name]||null;}

    function renderPickerItems(filter=''){
      itemsWrap.innerHTML='';
      itemLists[sec.id].filter(n=>n.includes(filter)).forEach(name=>{
        const btn=document.createElement('button');
        btn.className='picker-item'+(selected[sec.id][name]?' selected':'');
        btn.textContent=name;
        btn.addEventListener('click',()=>{
          if(selected[sec.id][name]) delete selected[sec.id][name];
          else selected[sec.id][name]={qty:'',inUnit:'box',useConv:!!getConv(name)};
          renderPickerItems(searchEl.value);
          renderSelInputs();
        });
        itemsWrap.appendChild(btn);
      });
      const mgBtn=document.createElement('button');
      mgBtn.className='picker-item manage-btn';mgBtn.textContent='⚙️ 품목 관리';

    function renderSelInputs(){
      selInputs.innerHTML='';
      const names=Object.keys(selected[sec.id]);
      selInputs.style.display=names.length?'flex':'none';
      submitBtn.style.display=names.length?'block':'none';

      names.forEach(name=>{
        const conv=getConv(name);
        const block=document.createElement('div');
        block.className='sel-item-block';

        const nameRow=document.createElement('div');

        nameRow.innerHTML=`<span>${name}</span>`;

        if(conv){
          const badge=document.createElement('span');
          badge.className='sel-conv-badge';
          let badgeTxt=`1 ${conv.inUnit} = ${conv.ratio} ${conv.outUnit}`;
          if(conv.eachVol&&conv.eachUnit) badgeTxt+=`, ${conv.eachVol}${conv.eachUnit} each`;
          badge.textContent=badgeTxt;
          nameRow.appendChild(badge);
        }
        block.appendChild(nameRow);

        if(conv){
          // 변환 단위 있음 → 입고 단위로 입력
          const r1=document.createElement('div');r1.className='sel-row';
          r1.innerHTML=`<span class="sel-label">입고량</span>`;
          const qInp=document.createElement('input');
          qInp.className='sel-num';qInp.type='number';qInp.placeholder='수량';qInp.min='0';qInp.step='any';
          qInp.value=selected[sec.id][name].qty||'';

          const unitSpan=document.createElement('span');
          unitSpan.className='sel-sel';unitSpan.style.cssText='background:var(--accent-bg);color:var(--accent-dark);border-color:var(--accent-light);padding:8px 10px;border-radius:8px;font-size:0.82rem;border:1px solid';
          unitSpan.textContent=conv.inUnit;

          const hint=document.createElement('span');
          hint.className='conv-hint';

          function updateHint(){
            const v=parseFloat(qInp.value)||0;
            if(!v){hint.textContent='';return;}
            let h=`→ ${v*conv.ratio} ${conv.outUnit}`;
            if(conv.eachVol&&conv.eachUnit) h+=` (${conv.eachVol}${conv.eachUnit} each)`;
            hint.textContent=h;
          }
          qInp.addEventListener('input',()=>{selected[sec.id][name].qty=qInp.value;selected[sec.id][name].inUnit=conv.inUnit;updateHint();});
          r1.appendChild(qInp);r1.appendChild(unitSpan);r1.appendChild(hint);

          const priceInp=document.createElement('input');
          priceInp.className='sel-num';priceInp.type='number';priceInp.placeholder='선택사항';
          priceInp.min='0';priceInp.step='0.01';
          priceInp.value=selected[sec.id][name].price||'';

          priceInp.value=selected[sec.id][name].price||'';

    submitBtn.addEventListener('click',async()=>{
      const entries=Object.entries(selected[sec.id]);
      if(!entries.length){showToast('품목을 선택하세요');return;}
      let saved=0;
      let lastError=null;
      console.log('[입고] 시작 - section:', sec.id, '품목수:', entries.length);
      for(const [name,val] of entries){
        const conv=getConv(name);
        const rawQty=parseFloat(val.qty);
        if(!rawQty||rawQty<=0)continue;
        let stockQty,stockUnit,inboundQty,inboundUnit;
        if(conv){
          inboundQty=rawQty;inboundUnit=conv.inUnit;
          stockQty=rawQty*conv.ratio;stockUnit=conv.outUnit;
        } else {
          inboundQty=rawQty;inboundUnit=val.inUnit||'개';
          stockQty=rawQty;stockUnit=val.inUnit||'개';
        }
        // 같은 이름+단위 품목이 있으면 수량 합산, 없으면 새로 생성
        const existing = cache[sec.id].find(i=>i.name===name && i.unit===stockUnit);
        try {
          if(existing){
            const newQty = (existing.qty||0) + stockQty;
            const newRemaining = (existing.remaining!==undefined&&existing.remaining!==null?existing.remaining:existing.qty) + stockQty;
            const updateData = {
              qty: newQty,
              remaining: newRemaining,
              inboundQty: inboundQty,
              inboundUnit: inboundUnit,
              updatedAt: Date.now(),
              addedBy: currentUser?.displayName||currentUser?.email||'',
            };
            // 예전 데이터에 createdAt이 없으면 보충 (정렬/필터 누락 방지)
            if(!existing.createdAt) updateData.createdAt = Date.now();
            console.log('[입고] UPDATE', name, 'docId:', existing.id, updateData);
            await updateDoc(doc(db,`inv_${sec.id}`,existing.id),updateData);
            console.log('[입고] UPDATE 성공', name);
          } else {
            const newDoc = {
              name,qty:stockQty,unit:stockUnit,remaining:stockQty,
              inboundQty,inboundUnit,
              createdAt:Date.now(),
              addedBy:currentUser?.displayName||currentUser?.email||'',
            };
            console.log('[입고] ADD', name, newDoc);
            const ref = await addDoc(collection(db,`inv_${sec.id}`),newDoc);
            console.log('[입고] ADD 성공', name, '새 docId:', ref.id);
          }
          saved++;

          // 가격 정보 있으면 원가계산 컬렉션에 자동 연동
          const rawPrice=parseFloat(val.price);
          if(rawPrice>0){
            const priceUnit=val.priceUnit || (conv?conv.inUnit:'개');
            await syncToCost(name, rawQty, rawPrice, priceUnit, conv);
          }
        } catch(e) {
          lastError=e;
          console.error('[입고] 실패', name, e.code, e.message, e);
        }
      }
      if(lastError){
        showToast('저장 실패: '+(lastError.code||lastError.message||'알 수 없음'));
        return;
      }
      if(!saved){showToast('수량을 입력하세요');return;}
      selected[sec.id]={};renderPickerItems();renderSelInputs();
      showToast(`${saved}개 품목 입고됨 ✓`);
    });

    hdr.addEventListener('click',()=>{
      const isOpen=picker.classList.contains('open');
      picker.classList.toggle('open',!isOpen);
      hdr.classList.toggle('open',!isOpen);
      hdr.querySelector('.chevron').classList.toggle('open',!isOpen);
      if(!isOpen)renderPickerItems();
    });

    card.appendChild(hdr);card.appendChild(picker);card.appendChild(selInputs);
    view.appendChild(card);
  });
}

// ── STOCK ─────────────────────────────────────────────
function renderStock(){
  const view=document.getElementById('tab-stock');view.innerHTML='';
  let hasAny=false;

  // ── Favorites section first ──
  const favItems = [];
  SECTIONS.forEach(sec=>{
    cache[sec.id].forEach(item=>{
      if(isFav(sec.id, item.name)) favItems.push({...item, secId:sec.id, secLabel:sec.label, secIcon:sec.icon});
    });
  });
  if(favItems.length){
    hasAny=true;
    const favCard=document.createElement('div');favCard.className='sec-section';
    const favHdr=document.createElement('div');favHdr.className='section-hdr open';
    favHdr.innerHTML=`<div class="section-title-row"><div class="section-icon">⭐</div><span class="section-name">즐겨찾기</span><span class="section-badge">${favItems.length}</span></div><span class="chevron open">▾</span>`;
    favHdr.addEventListener('click',()=>{const lw=favCard.querySelector('.item-list-wrap');lw.classList.toggle('hidden');favHdr.querySelector('.chevron').classList.toggle('open');favHdr.classList.toggle('open');});
    favCard.appendChild(favHdr);
    const favList=document.createElement('div');favList.className='item-list-wrap';
    favItems.forEach(item=>{
      const sec={id:item.secId,label:item.secLabel,icon:item.secIcon};
      const row=document.createElement('div');row.className='item-row';
      const remaining=(item.remaining!==undefined&&item.remaining!==null)?item.remaining:item.qty;
      const conv2=conversions[sec.id]&&conversions[sec.id][item.name];
      // 메인: 저장된 그대로 (이미 변환 단위). 괄호: 입고 단위로 역산
      const qtyDisplay=`${remaining} ${item.unit}`;
      let parenDisplay='';
      if(conv2&&conv2.ratio&&conv2.inUnit){
        const inUnits=(remaining/conv2.ratio).toFixed(1);
        parenDisplay=`(${inUnits} ${conv2.inUnit})`;
      }
      row.innerHTML=`
        <button class="star-btn active" title="즐겨찾기">★</button>
        <div class="item-info">
          <div class="item-name">${item.name} <span style="font-size:0.7rem;color:var(--muted);font-weight:400">${item.secIcon} ${item.secLabel}</span></div>

            <button class="quick-out-btn" data-q="1">−1</button>
            <button class="quick-out-btn" data-q="5">−5</button>
            <button class="quick-out-btn" data-q="10">−10</button>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="item-qty">${qtyDisplay}</div>
          ${parenDisplay?`<div style="font-size:0.65rem;color:var(--muted);margin-top:1px">${parenDisplay}</div>`:''}
        </div>
      `;
      row.querySelector('.star-btn').addEventListener('click',(e)=>{
        e.stopPropagation();
        toggleFav(sec.id, item.name);
        renderStock();
      });
      row.querySelectorAll('.quick-out-btn').forEach(btn=>{
        btn.addEventListener('click', async (e)=>{
          e.stopPropagation();
          const q = parseFloat(btn.dataset.q);
          const cur = (item.remaining!==undefined&&item.remaining!==null)?item.remaining:item.qty;
          const newR = Math.max(0, cur - q);
          await updateDoc(doc(db,`inv_${sec.id}`,item.id),{remaining:newR});
          showToast(`${item.name} −${q} ${item.unit}`);
        });
      });
      favList.appendChild(row);
    });
    favCard.appendChild(favList);
    view.appendChild(favCard);
  }

  SECTIONS.forEach(sec=>{
    const items=[...cache[sec.id]].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    if(!items.length)return;
    hasAny=true;
    const card=document.createElement('div');card.className='section-card';
    const hdr=document.createElement('div');hdr.className='section-header open';
    hdr.innerHTML=`<div class="section-title-row"><div class="section-icon">${sec.icon}</div><span class="section-name">${sec.label}</span><span class="section-badge">${items.length}</span></div><span class="chevron open">▾</span>`;
    hdr.addEventListener('click',()=>{const lw=card.querySelector('.item-list-wrap');lw.classList.toggle('hidden');hdr.querySelector('.chevron').classList.toggle('open');hdr.classList.toggle('open');});
    card.appendChild(hdr);
    const list=document.createElement('div');list.className='item-list-wrap';
    items.forEach(item=>{
      const row=document.createElement('div');row.className='item-row';
      const inInfo=item.inboundQty?`입고: ${item.inboundQty}${item.inboundUnit}`:'';
      // 메인: 저장된 그대로 (이미 변환 단위). 괄호: 입고 단위로 역산
      const remaining=(item.remaining!==undefined&&item.remaining!==null)?item.remaining:item.qty;
      const conv2=conversions[sec.id]&&conversions[sec.id][item.name];
      const qtyDisplay=`${remaining} ${item.unit}`;
      let parenDisplay='';
      let eachInfo='';
      if(conv2&&conv2.ratio&&conv2.inUnit){
        const inUnits=(remaining/conv2.ratio).toFixed(1);
        parenDisplay=`(${inUnits} ${conv2.inUnit})`;
        if(conv2.eachVol&&conv2.eachUnit) eachInfo=`${conv2.eachVol}${conv2.eachUnit} each`;
      }
      const isFavorite = isFav(sec.id, item.name);
      row.innerHTML=`
        <button class="star-btn ${isFavorite?'active':''}" title="즐겨찾기">${isFavorite?'★':'☆'}</button>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${fmtDate(item.createdAt)}${item.addedBy?' · '+item.addedBy:''}${inInfo?' · '+inInfo:''}${eachInfo?' · '+eachInfo:''}</div>
          <div class="quick-out-row">
            <button class="quick-out-btn" data-q="1">−1</button>
            <button class="quick-out-btn" data-q="5">−5</button>
            <button class="quick-out-btn" data-q="10">−10</button>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="item-qty">${qtyDisplay}</div>
          ${parenDisplay?`<div style="font-size:0.65rem;color:var(--muted);margin-top:1px">${parenDisplay}</div>`:''}
        </div>
        <button class="stock-edit">✏️</button>
        <button class="del-btn">✕</button>
      `;
      row.querySelector('.star-btn').addEventListener('click',(e)=>{
        e.stopPropagation();
        toggleFav(sec.id, item.name);
        renderStock();
      });
      row.querySelectorAll('.quick-out-btn').forEach(btn=>{
        btn.addEventListener('click', async (e)=>{
          e.stopPropagation();
          const q = parseFloat(btn.dataset.q);
          const cur = (item.remaining!==undefined&&item.remaining!==null)?item.remaining:item.qty;
          const newR = Math.max(0, cur - q);
          await updateDoc(doc(db,`inv_${sec.id}`,item.id),{remaining:newR});
          showToast(`${item.name} −${q} ${item.unit}`);
        });
      });
      row.querySelector('.stock-edit').addEventListener('click',()=>openEdit(sec.id,item));
      row.querySelector('.del-btn').addEventListener('click',()=>{row.style.opacity='0';row.style.transition='opacity .2s';setTimeout(()=>deleteDoc(doc(db,`inv_${sec.id}`,item.id)),200);});
      list.appendChild(row);
    });
    card.appendChild(list);view.appendChild(card);
  });
  if(!hasAny)view.innerHTML='<div style="padding:32px;text-align:center;color:var(--muted);font-size:0.85rem">입고된 항목이 없어요</div>';
}

// ── OUTBOUND ──────────────────────────────────────────
function renderOutbound(){
  const view=document.getElementById('tab-outbound');view.innerHTML='';
  SECTIONS.forEach(sec=>{
    const items=[...cache[sec.id]].sort((a,b)=>a.name.localeCompare(b.name,'ko'));
    if(!items.length)return;
    const card=document.createElement('div');card.className='section-card';
    const hdr=document.createElement('div');hdr.className='section-header open';
    hdr.innerHTML=`<div class="section-title-row"><div class="section-icon">${sec.icon}</div><span class="section-name">${sec.label}</span><span class="section-badge">${items.length}</span></div><span class="chevron open">▾</span>`;
    hdr.addEventListener('click',()=>{const lw=card.querySelector('.item-list-wrap');lw.classList.toggle('hidden');hdr.querySelector('.chevron').classList.toggle('open');hdr.classList.toggle('open');});
    card.appendChild(hdr);
    const list=document.createElement('div');list.className='item-list-wrap';
    items.forEach(item=>{
      const remaining=item.remaining??item.qty;
      const pct=item.qty>0?(remaining/item.qty)*100:0;
      const sc=pct<=15?'urgent':pct<=40?'warn':'';
      const row=document.createElement('div');row.className='out-row';
      row.innerHTML=`
        <div class="out-info">
          <div class="out-name">${item.name}</div>
          <div class="out-sub">${item.qty} ${item.unit} 입고${item.inboundQty?` (${item.inboundQty}${item.inboundUnit})`:''}</div>
          <div class="out-bar-bg"><div class="out-bar-fill ${sc}" style="width:${Math.min(pct,100).toFixed(1)}%"></div></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0">
          <span class="out-remaining ${sc}">${remaining} ${item.unit}</span>
        </div>
        <button class="out-minus">−</button>
        <input class="out-input" type="number" value="1" min="0" step="any"/>
        <button class="out-update">출고</button>
      `;
      row.querySelector('.out-minus').addEventListener('click',async()=>{
        const nv=Math.max(0,(item.remaining??item.qty)-1);
        await updateDoc(doc(db,`inv_${sec.id}`,item.id),{remaining:nv});
        showToast(`-1 ${item.unit}`);
      });
      row.querySelector('.out-update').addEventListener('click',async()=>{
        const inp=row.querySelector('.out-input');
        const amt=parseFloat(inp.value);
        if(isNaN(amt)||amt<0)return;
        const nv=Math.max(0,(item.remaining??item.qty)-amt);
        await updateDoc(doc(db,`inv_${sec.id}`,item.id),{remaining:nv});
        inp.value='1';showToast(`-${amt} ${item.unit} ✓`);
      });
      list.appendChild(row);
    });
    card.appendChild(list);view.appendChild(card);
  });
  if(!view.children.length)view.innerHTML='<div style="padding:32px;text-align:center;color:var(--muted);font-size:0.85rem">입고된 항목이 없어요</div>';
}

// ── ORDER / URGENT ────────────────────────────────────
function renderOrderUrgent(){
  const oV=document.getElementById('tab-order');const uV=document.getElementById('tab-urgent');
  oV.innerHTML='';uV.innerHTML='';
  const oItems=[],uItems=[];
  SECTIONS.forEach(sec=>{
    cache[sec.id].forEach(item=>{
      const r=item.remaining??item.qty;const pct=item.qty>0?(r/item.qty)*100:0;
      if(pct<=15)uItems.push({...item,sec});else if(pct<=40)oItems.push({...item,sec});
    });
  });
  const ob=document.getElementById('badge-order');const ub=document.getElementById('badge-urgent');
  ob.style.display=oItems.length?'inline-block':'none';ob.textContent=oItems.length;
  ub.style.display=uItems.length?'inline-block':'none';ub.textContent=uItems.length;
  function build(view,items,cls){
    if(!items.length){view.innerHTML=`<div class="alert-card"><div class="empty-alert">${cls==='urgent'?'✅ 긴급 없어요':'🎉 주문 필요 없어요'}</div></div>`;return;}
    SECTIONS.forEach(sec=>{
      const si=items.filter(i=>i.sec.id===sec.id).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
      if(!si.length)return;
      const card=document.createElement('div');card.className='alert-card'+(cls==='urgent'?' urgent-card':'');
      card.innerHTML=`<div class="alert-header ${cls}">${cls==='urgent'?'🚨 ':''} ${sec.icon} ${sec.label} (${si.length})</div>`;
      si.forEach(item=>{
        const r=item.remaining??item.qty;const pct=item.qty>0?(r/item.qty)*100:0;
        const row=document.createElement('div');row.className='alert-row';
        row.innerHTML=`<div><div class="alert-name">${item.name}</div><div class="alert-sub">잔여 ${r} ${item.unit}</div></div><span class="alert-pct ${cls}">${pct.toFixed(0)}%</span>`;
        card.appendChild(row);
      });
      view.appendChild(card);
    });
  }
  build(oV,oItems,'warn');build(uV,uItems,'urgent');
}

// ── Conversion sheet ──────────────────────────────────
function openConvSheet(secId,itemName,cb){
  convSecId=secId;convItem=itemName;convCallback=cb;
  const existing=conversions[secId]&&conversions[secId][itemName];
  document.getElementById('conv-title').textContent=`"${itemName}" 단위 변환 설정`;
  document.getElementById('conv-hint').textContent=`입고 단위(box, case 등) 1개가 출고 단위 몇 개에 해당하는지 입력하세요.\n예) 간장 1 box = 10 개`;
  document.getElementById('conv-in-unit').value=(existing&&existing.inUnit)||'box';
  document.getElementById('conv-out-unit').value=(existing&&existing.outUnit)||'개';
  document.getElementById('conv-ratio').value=(existing&&existing.ratio)||'';
  document.getElementById('conv-each-vol').value=(existing&&existing.eachVol)||'';
  document.getElementById('conv-each-unit').value=(existing&&existing.eachUnit)||'';
  // 리셋 버튼은 기존 변환이 있을 때만 표시
  document.getElementById('conv-reset').style.display=existing?'block':'none';
  updateConvLabel();
  document.getElementById('conv-overlay').classList.add('open');
  document.getElementById('conv-sheet').classList.add('open');
}
function closeConv(){document.getElementById('conv-overlay').classList.remove('open');document.getElementById('conv-sheet').classList.remove('open');}
document.getElementById('conv-overlay').addEventListener('click',closeConv);

function updateConvLabel(){
  const inU=document.getElementById('conv-in-unit').value;
  const outU=document.getElementById('conv-out-unit').value;
  const ratio=document.getElementById('conv-ratio').value;
  const eachVol=document.getElementById('conv-each-vol').value;
  const eachUnit=document.getElementById('conv-each-unit').value;
  document.getElementById('conv-ratio-label').textContent=ratio?`${inU} 1개 = ${ratio} ${outU}`:`${inU} 1개당 ${outU} 수량`;
  const exEl=document.getElementById('conv-example-label');
  if(ratio&&eachVol&&eachUnit) exEl.textContent=`예) 1 ${inU} = ${ratio} ${outU}, ${eachVol}${eachUnit} each`;
  else exEl.textContent='';
}
document.getElementById('conv-in-unit').addEventListener('change',updateConvLabel);
document.getElementById('conv-out-unit').addEventListener('change',updateConvLabel);
document.getElementById('conv-ratio').addEventListener('input',updateConvLabel);
document.getElementById('conv-each-vol').addEventListener('input',updateConvLabel);
document.getElementById('conv-each-unit').addEventListener('change',updateConvLabel);

document.getElementById('conv-save').addEventListener('click',async()=>{
  const inUnit=document.getElementById('conv-in-unit').value;
  const outUnit=document.getElementById('conv-out-unit').value;
  const ratio=parseFloat(document.getElementById('conv-ratio').value);
  const eachVol=parseFloat(document.getElementById('conv-each-vol').value)||null;
  const eachUnit=document.getElementById('conv-each-unit').value||null;
  if(!ratio||ratio<=0){showToast('변환 비율을 입력하세요');return;}
  if(!conversions[convSecId])conversions[convSecId]={};
  conversions[convSecId][convItem]={inUnit,outUnit,ratio,eachVol,eachUnit};
  const convRef=doc(db,'item_conversions',convSecId);
  const snap=await getDoc(convRef);
  const existing=snap.exists()?snap.data():{};
  existing[convItem]={inUnit,outUnit,ratio,eachVol,eachUnit};
  await setDoc(convRef,existing);
  showToast('변환 설정 저장됨 ✓');
  closeConv();
  if(convCallback)convCallback();
  renderInbound();
});

// 변환 설정 리셋
document.getElementById('conv-reset').addEventListener('click',async()=>{
  if(!convSecId||!convItem)return;
  if(!confirm(`"${convItem}"의 변환 설정을 정말 삭제할까요?`))return;
  // 메모리에서 삭제
  if(conversions[convSecId]) delete conversions[convSecId][convItem];
  // Firestore에서 삭제
  const convRef=doc(db,'item_conversions',convSecId);
  const snap=await getDoc(convRef);
  if(snap.exists()){
    const data=snap.data();
    delete data[convItem];
    await setDoc(convRef,data);
  }
  showToast('변환 설정 삭제됨 ✓');
  closeConv();
  if(convCallback)convCallback();
  renderInbound();
});

// ── Manage items sheet ────────────────────────────────
function openManage(secId){
  managingSecId=secId;

  document.getElementById('manage-title').textContent=`${sec.label} 품목 관리`;
  renderManageList();

  document.getElementById('manage-sheet').classList.add('open');
}
function closeManage(){document.getElementById('manage-overlay').classList.remove('open');document.getElementById('manage-sheet').classList.remove('open');managingSecId=null;}
document.getElementById('manage-overlay').addEventListener('click',closeManage);

function renderManageList(){
  const list=document.getElementById('manage-list');list.innerHTML='';
  itemLists[managingSecId].forEach((name,i)=>{
    const row=document.createElement('div');row.className='manage-row';
    row.innerHTML=`<span class="manage-name">${name}</span><button class="manage-del">✕</button>`;
    row.querySelector('.manage-del').addEventListener('click',async()=>{

document.getElementById('manage-add-btn').addEventListener('click',async()=>{

  if(!name){showToast('품목명 입력');return;}
  if(itemLists[managingSecId].includes(name)){showToast('이미 있는 품목');return;}
  itemLists[managingSecId].push(name);
  itemLists[managingSecId].sort((a,b)=>a.localeCompare(b,'ko'));
  await setDoc(doc(db,'item_lists',managingSecId),{items:itemLists[managingSecId]});
  inp.value='';renderManageList();renderInbound();showToast('추가됨 ✓');
});
document.getElementById('manage-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('manage-add-btn').click();});
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('/app/sw.js').catch(()=>{});}</script>
<script>
(function(){
  const row = document.getElementById('theme-toggle-row');
  if(!row) return;
  const valEl = document.getElementById('theme-val');
  const iconEl = document.getElementById('theme-icon-label');
  const update = () => {
    const t = localStorage.getItem('app_theme') || 'auto';
    const map = {auto:'자동', light:'라이트', dark:'다크'};
    const icons = {auto:'🌓 테마', light:'☀️ 라이트', dark:'🌙 다크'};
    valEl.textContent = map[t];
    iconEl.textContent = icons[t];
  };
  update();
  row.addEventListener('click', () => {
    const cur = localStorage.getItem('app_theme') || 'auto';
    const next = cur==='auto' ? 'light' : cur==='light' ? 'dark' : 'auto';
    localStorage.setItem('app_theme', next);
    document.body.setAttribute('data-theme', next);
    update();
  });
})();
</script>
</body>
</html>
